<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Three Cushion Solution Searcher</title>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background-color: #262626;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgb(0 0 0 / 50%);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            color: #4dabf7;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        #status-area {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #333;
            border-radius: 4px;
            border-left: 4px solid #4dabf7;
        }

        #progress-bar-container {
            width: 100%;
            height: 12px;
            background-color: #444;
            border-radius: 6px;
            overflow: hidden;
            margin: 10px 0;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #4dabf7;
            transition: width 0.1s linear;
        }

        #stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #aaa;
            font-family: monospace;
        }

        .results-container {
            margin-top: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #444;
        }

        th {
            background-color: #333;
            color: #4dabf7;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        tr:hover {
            background-color: #2d2d2d;
        }

        .pattern-col {
            font-family: monospace;
            color: #ff79c6;
            font-size: 0.9rem;
        }

        .count-col {
            font-weight: bold;
            text-align: right;
            width: 100px;
            color: #50fa7b;
        }

        .info-msg {
            padding: 10px;
            background: #2b2f3a;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #8be9fd;
        }

        .empty-msg {
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Three Cushion Solution Searcher</h1>

        <div id="status-area">
            <div id="status-text">Initialising...</div>
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div id="stats">
                <span id="stat-progress">Progress: 0 / 0</span>
                <span id="stat-found">Solutions: 0</span>
                <span id="stat-time">Time: 0s</span>
            </div>
        </div>

        <div class="info-msg" id="info-msg">
            Searching space: Angle (180 steps), Power (4 steps), Offset X/Y (5 steps each). Total: 18,000 combinations.
        </div>

        <div class="results-container">
            <table id="results-table">
                <thead>
                    <tr>
                        <th>Outcome Pattern (Types)</th>
                        <th class="count-col">Count</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    <tr><td colspan="2" class="empty-msg">Waiting for search to start...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        const R = 0.03275;
        const maxPower = 160 * R; // Default maxPower in the engine
        const TWO_R = 2 * R;

        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const statProgress = document.getElementById('stat-progress');
        const statFound = document.getElementById('stat-found');
        const statTime = document.getElementById('stat-time');
        const resultsBody = document.getElementById('results-body');

        // Parse query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const initParam = urlParams.get('init');

        let ballPositions = [];
        if (initParam) {
            try {
                ballPositions = JSON.parse(initParam);
            } catch (e) {
                // Fallback for comma separated
                ballPositions = initParam.split(',').map(Number);
            }
        }

        if (!initParam) {
            statusText.textContent = "Waiting for 'init' parameter (e.g. ?init=[x0,y0,x1,y1,x2,y2])";
            statusText.style.color = "#ff922b";
        } else if (ballPositions.length < 6 || ballPositions.some(isNaN)) {
            statusText.textContent = "Error: Invalid 'init' parameter. Expected JSON array of at least 6 coordinates.";
            statusText.style.color = "#ff6b6b";
        } else {
            startSearch();
        }

        async function startSearch() {
            const balls = [];
            for (let i = 0; i < ballPositions.length; i += 2) {
                balls.push({ id: i / 2, pos: { x: ballPositions[i], y: ballPositions[i+1], z: 0 } });
            }

            // Define search space
            const angles = [];
            for (let i = 0; i < 180; i++) {
                angles.push(i * Math.PI / 90);
            }

            const powerPercents = [0.25, 0.50, 0.75, 1.00];
            const offsetValues = [-0.4, -0.2, 0.0, 0.2, 0.4];

            const tasks = [];
            for (const angle of angles) {
                for (const pPct of powerPercents) {
                    const power = pPct * maxPower;
                    for (const ox of offsetValues) {
                        for (const oy of offsetValues) {
                            tasks.push({ angle, power, ox, oy });
                        }
                    }
                }
            }

            const totalTasks = tasks.length;
            statProgress.textContent = `Progress: 0 / ${totalTasks}`;
            statusText.textContent = `Searching ${totalTasks} combinations...`;

            let completed = 0;
            let foundCount = 0;
            const patterns = new Map();
            let nextTaskIndex = 0;
            const startTime = performance.now();

            const concurrency = Math.min(navigator.hardwareConcurrency || 4, 8); // Cap at 8 for stability
            const workers = Array.from({ length: concurrency }, () => new Worker('../worker.js'));

            const updateUI = () => {
                const pct = (completed / totalTasks) * 100;
                progressBar.style.width = `${pct}%`;
                statProgress.textContent = `Progress: ${completed} / ${totalTasks}`;
                statFound.textContent = `Solutions: ${foundCount}`;
                statTime.textContent = `Time: ${Math.round((performance.now() - startTime) / 1000)}s`;
            };

            const runNext = (worker) => {
                if (nextTaskIndex >= totalTasks) {
                    worker.terminate();
                    if (completed === totalTasks) {
                        finishSearch();
                    }
                    return;
                }

                const taskIndex = nextTaskIndex++;
                const task = tasks[taskIndex];

                worker.onmessage = (e) => {
                    if (e.data.type === 'COMPLETE') {
                        processResult(e.data);
                        completed++;
                        if (completed % 100 === 0 || completed === totalTasks) {
                            updateUI();
                        }
                        runNext(worker);
                    } else if (e.data.type === 'ERROR') {
                        console.error("Worker error:", e.data.error);
                        completed++;
                        runNext(worker);
                    }
                };

                worker.postMessage({
                    id: taskIndex,
                    ruleType: "threecushion",
                    balls: balls,
                    shot: {
                        cueBallId: 0,
                        angle: task.angle,
                        power: task.power,
                        offset: { x: task.ox, y: task.oy },
                        elevation: 0
                    },
                    recordTrajectory: false,
                    params: {}
                });
            };

            function processResult(data) {
                // Look for proximity < 2R
                // The worker returns distance in 'speed' field for Proximity outcomes
                const proximity = data.outcomes.find(o => o.type === 'Proximity' && o.speed < TWO_R);
                if (proximity) {
                    foundCount++;
                    // Pattern: sequence of outcome types
                    const patternStr = data.outcomes
                        .map(o => o.type.toLowerCase())
                        .join(', ');

                    patterns.set(patternStr, (patterns.get(patternStr) || 0) + 1);
                }
            }

            function finishSearch() {
                const elapsed = (performance.now() - startTime) / 1000;
                statusText.textContent = `Search complete in ${elapsed.toFixed(1)}s. Found ${foundCount} valid shots.`;
                statusText.style.color = "#51cf66";
                updateUI();

                // Render patterns table
                const sortedPatterns = [...patterns.entries()].sort((a, b) => b[1] - a[1]);
                resultsBody.innerHTML = '';

                if (sortedPatterns.length === 0) {
                    resultsBody.innerHTML = '<tr><td colspan="2" class="empty-msg">No solutions found within criteria.</td></tr>';
                } else {
                    for (const [pattern, count] of sortedPatterns) {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="pattern-col">${pattern}</td>
                            <td class="count-col">${count}</td>
                        `;
                        resultsBody.appendChild(tr);
                    }
                }
            }

            // Start all workers
            workers.forEach(w => runNext(w));
        }
    </script>
</body>
</html>
