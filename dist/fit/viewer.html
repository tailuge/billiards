<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Viewer</title></head>
<body style="display:flex;flex-direction:column;align-items:center;padding:20px;font-family:monospace">
  <input type="file" id="file" accept=".json">
  <textarea id="shot" rows="9" cols="50" style="margin-top:8px;font-family:monospace;font-size:13px" disabled></textarea>
  <div style="margin-top:6px;display:flex;gap:8px">
    <button id="simBtn" disabled>Run Sim</button>
    <button id="saveBtn" disabled>Save JSON</button>
  </div>
  <span id="status" style="color:#555;font-size:13px;margin-top:4px"></span>
  <canvas id="c" style="margin-top:12px;border:1px solid #ccc"></canvas>
  <pre id="report" style="margin-top:12px;font-size:13px"></pre>
<script type="module">
import { runSim } from './sim.js'
import { redraw, HALF_W, HALF_H } from './plot.js'

const W = 900, H = Math.round(W * HALF_H / HALF_W)
const canvas = document.getElementById('c')
canvas.width = W; canvas.height = H

let simTracks = null, simStep = 0.001953125, loadedData = null

function updateDrawing() {
  if (!loadedData) return
  redraw(canvas, loadedData.truth, simTracks, simStep)
}

document.getElementById('file').onchange = e => {
  const reader = new FileReader()
  reader.onload = ev => loadData(JSON.parse(ev.target.result))
  reader.readAsText(e.target.files[0])
}

function loadData(data) {
  loadedData = data
  simTracks = null
  document.getElementById('shot').value = JSON.stringify(loadedData.sim.shot, null, 2)
  document.getElementById('shot').disabled = false
  document.getElementById('simBtn').disabled = false
  document.getElementById('saveBtn').disabled = false
  document.getElementById('report').textContent = loadedData.report ?? ''
  updateDrawing()
}

fetch('./SS_max_spin_02.json').then(r => r.json()).then(loadData).catch(() => {})

async function onRunSim() {
  const btn = document.getElementById('simBtn')
  const status = document.getElementById('status')
  let shot
  try { shot = JSON.parse(document.getElementById('shot').value) }
  catch (e) { status.textContent = 'Invalid shot JSON'; return }

  loadedData.sim.shot = shot
  btn.disabled = true
  status.textContent = 'Running...'
  try {
    const t0 = performance.now()
    const result = await runSim(loadedData.sim, loadedData.truth)
    status.textContent = `Done in ${Math.round(performance.now() - t0)}ms — ${result.frames.length} frames`
    simStep = result.simStep
    simTracks = result.simTracks
    if (result.rmse !== null) {
      status.textContent += `  RMSE=${(result.rmse * 100).toFixed(1)}cm`
    }
    updateDrawing()
  } catch (err) {
    status.textContent = `Error: ${err.message}`
  }
  btn.disabled = false
}

document.getElementById('simBtn').onclick = onRunSim

document.getElementById('saveBtn').onclick = async () => {
  let shot
  try { shot = JSON.parse(document.getElementById('shot').value) }
  catch (e) { document.getElementById('status').textContent = 'Invalid shot JSON'; return }
  loadedData.sim.shot = shot
  const blob = new Blob([JSON.stringify(loadedData, null, 2)], { type: 'application/json' })
  if (window.showSaveFilePicker) {
    const fh = await window.showSaveFilePicker({ suggestedName: loadedData.source?.split('/').pop()?.replace('.txt', '.json') ?? 'output.json' })
    const w = await fh.createWritable()
    await w.write(blob); await w.close()
  } else {
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'output.json' })
    a.click()
  }
}
</script>
</body>
</html>
