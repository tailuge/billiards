<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.8em%22 font-size=%2290%22>═</text></svg>"
    />
    <link rel="stylesheet" href="../css/ball-colors.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f0f0f0;
        padding: 2px;
      }
      .page {
        max-width: 800px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .controls-bar {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 2px 4px;
        font-size: 11px;
      }
      .controls-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .constant-group {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .group-label {
        font-weight: 600;
        font-size: 10px;
        text-align: center;
        padding: 2px;
      }
      .constant-row {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        color: #555;
        width: 100%;
      }
      .constant-row input[type="range"] {
        flex: 1;
        height: 4px;
        accent-color: #888;
      }
      .constant-row span.val {
        display: inline-block;
        width: 44px;
        text-align: right;
        font-family: monospace;
        font-size: 10px;
      }
      .pair-wrapper {
        position: relative;
        width: 100%;
      }
      svg.billiards-table {
        width: 100%;
        height: auto;
        display: block;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      svg.billiards-table.adjusted {
        position: absolute;
        inset: 0;
        background: transparent;
      }
      svg.billiards-table.adjusted .trajectory-line {
        stroke-dasharray: 0.015 0.01;
      }
      .edit-btn {
        position: absolute;
        bottom: 4%;
        right: 5%;
        font-size: 16px;
        cursor: pointer;
        z-index: 10;
        opacity: 0.5;
        background: none;
        border: none;
        padding: 0;
        filter: grayscale(1);
      }
      .edit-btn:hover {
        opacity: 0.9;
        filter: none;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="controls-bar">
        <div class="controls-row">
          <div class="constant-group">
            <div class="group-label">Han</div>
            <div class="constant-row">
              <label for="mu">mu</label>
              <input
                id="mu"
                type="range"
                min="0.0001"
                max="0.02"
                step="0.0001"
                value="0.0055"
              />
              <span class="val" id="mu-val">0.0055</span>
            </div>
            <div class="constant-row">
              <label for="muS">muS</label>
              <input
                id="muS"
                type="range"
                min="0.0001"
                max="0.5"
                step="0.0001"
                value="0.126"
              />
              <span class="val" id="muS-val">0.126</span>
            </div>
          </div>
          <div class="constant-group">
            <div class="group-label">Mathavan</div>
            <div class="constant-row">
              <label for="μs">μs</label>
              <input
                id="μs"
                type="range"
                min="0.0001"
                max="0.99"
                step="0.0001"
                value="0.2"
              />
              <span class="val" id="μs-val">0.20</span>
            </div>
            <div class="constant-row">
              <label for="μw">μw</label>
              <input
                id="μw"
                type="range"
                min="0.0001"
                max="0.99"
                step="0.0001"
                value="0.2"
              />
              <span class="val" id="μw-val">0.20</span>
            </div>
            <div class="constant-row">
              <label for="ee">ee</label>
              <input
                id="ee"
                type="range"
                min="0.0001"
                max="0.99"
                step="0.0001"
                value="0.85"
              />
              <span class="val" id="ee-val">0.85</span>
            </div>
          </div>
          <div class="constant-group">
            <div class="group-label">Stronge</div>
            <div class="constant-row">
              <label for="stronge_omega_ratio">ω ratio</label>
              <input
                id="stronge_omega_ratio"
                type="range"
                min="0.0001"
                max="1.99"
                step="0.0001"
                value="1.76"
              />
              <span class="val" id="stronge_omega_ratio-val">1.76</span>
            </div>
            <div class="constant-row">
              <label for="stronge_e_n">eₙ</label>
              <input
                id="stronge_e_n"
                type="range"
                min="0.0001"
                max="0.99"
                step="0.0001"
                value="0.77"
              />
              <span class="val" id="stronge_e_n-val">0.77</span>
            </div>
            <div class="constant-row">
              <label for="stronge_μ">μ</label>
              <input
                id="stronge_μ"
                type="range"
                min="0.0001"
                max="0.99"
                step="0.0001"
                value="0.25"
              />
              <span class="val" id="stronge_μ-val">0.25</span>
            </div>
          </div>
        </div>
      </div>

      <svg
        class="billiards-table"
        data-json-shots='[{"balls":[{"id":0,"pos":{"x":-0.215634,"y":0.4309,"z":0}},{"id":1,"pos":{"x":0.505003,"y":0.419325,"z":0}},{"id":2,"pos":{"x":-0.752108,"y":0.703665,"z":0}}],"cushionModel":"mathavan","ruleType":"threecushion","shot":{"cueBallId":0,"angle":0.06926,"power":2.358,"offset":{"x":-0.330662,"y":0.305226,"z":0},"elevation":0}}]'
        data-figure="2.36 m/s"
        viewBox="-1.792395 -1.036198 3.584790 2.172395"
        xmlns="http://www.w3.org/2000/svg"
      ></svg>

      <svg
        class="billiards-table"
        data-json-shots='[{"balls":[{"id":0,"pos":{"x":-1.361711,"y":0.715988,"z":0}},{"id":1,"pos":{"x":0.637776,"y":0.229463,"z":0}},{"id":2,"pos":{"x":0.336882,"y":-0.039422,"z":0}}],"cushionModel":"mathavan","ruleType":"threecushion","shot":{"cueBallId":0,"angle":5.848069,"power":2.6724,"offset":{"x":0.033937,"y":0.395928,"z":0},"elevation":0}}]'
        data-figure="2.67 m/s"
        viewBox="-1.792395 -1.036198 3.584790 2.172395"
        xmlns="http://www.w3.org/2000/svg"
      ></svg>
    </div>

    <script type="module">
      import { initDiagrams } from "../diagrams/svg.js"

      const SLIDER_IDS = [
        "mu",
        "muS",
        "μs",
        "μw",
        "ee",
        "stronge_omega_ratio",
        "stronge_e_n",
        "stronge_μ",
      ]

      function getParams() {
        const params = {}
        for (const id of SLIDER_IDS) {
          const el = document.getElementById(id)
          if (el) params[id] = Number(el.value)
        }
        return params
      }

      function makeAdjustedSvg(source) {
        const jsonShots = JSON.parse(source.dataset.jsonShots)
        const withParams = jsonShots.map((cfg) => ({
          ...cfg,
          params: getParams(),
        }))
        const svg = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "svg"
        )
        svg.setAttribute("class", "billiards-table adjusted")
        svg.setAttribute("data-json-shots", JSON.stringify(withParams))
        svg.setAttribute("data-figure", source.dataset.figure || "")
        svg.setAttribute("viewBox", source.getAttribute("viewBox") || "")
        svg.setAttribute("xmlns", "http://www.w3.org/2000/svg")
        return svg
      }

      function makeEditBtn(sourceSvg) {
        const btn = document.createElement("button")
        btn.className = "edit-btn"
        btn.title = "Edit in three cushion research view"
        btn.textContent = "🔧"
        btn.addEventListener("click", () => {
          const config = JSON.parse(sourceSvg.dataset.jsonShots)[0]
          const ballsPos = config.balls.flatMap((b) => [b.pos.x, b.pos.y])
          const cueBall = config.balls[config.shot.cueBallId]
          const state = {
            diagram: true,
            init: ballsPos,
            shots: [
              {
                type: "AIM",
                angle: config.shot.angle,
                power: config.shot.power,
                offset: config.shot.offset,
                pos: { x: cueBall.pos.x, y: cueBall.pos.y, z: 0 },
                i: config.shot.cueBallId,
              },
            ],
          }
          const p = new URLSearchParams()
          p.set("s", JSON.stringify(state))
          window.open(`../diagrams/three.html?${p}`, "_blank")
        })
        return btn
      }

      function setup() {
        const sources = document.querySelectorAll(".page > svg.billiards-table")
        for (const source of sources) {
          const wrapper = document.createElement("div")
          wrapper.className = "pair-wrapper"
          source.parentNode.insertBefore(wrapper, source)

          const adjusted = makeAdjustedSvg(source)
          wrapper.appendChild(source)
          wrapper.appendChild(adjusted)

          const editBtn = makeEditBtn(source)
          wrapper.appendChild(editBtn)
        }
      }

      function refreshAdjusted() {
        const params = getParams()
        for (const svg of document.querySelectorAll(
          "svg.billiards-table.adjusted"
        )) {
          const jsonShots = JSON.parse(svg.dataset.jsonShots)
          const withParams = jsonShots.map((cfg) => ({ ...cfg, params }))
          svg.dataset.jsonShots = JSON.stringify(withParams)
          svg
            .querySelectorAll(".trajectories-group, .balls-group, .inset-group")
            .forEach((g) => g.remove())
        }
        initDiagrams()
      }

      // Wire slider value displays and refresh
      for (const slider of document.querySelectorAll(
        ".constant-row input[type=range]"
      )) {
        const valEl = document.getElementById(slider.id + "-val")
        if (valEl) {
          slider.addEventListener("input", () => {
            valEl.textContent = Number(slider.value).toFixed(
              slider.step < 1 ? 4 : 2
            )
            refreshAdjusted()
          })
        }
      }

      setup()
      initDiagrams()
    </script>
  </body>
</html>
