    />

      content="Play speedrun billiards online with accurate physics. Open source and browser-based."
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Speedrun Billiards",
        "url": "https://billiards.tailuge.workers.dev/itch/itch-speedrun.html",
        "image": "https://billiards.tailuge.workers.dev/assets/speedrun.png",
        "description": "Fast-paced billiards simulation game. Clear the table as fast as possible.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Break Builder",
          "logo": {
            "@type": "ImageObject",
            "url": "https://billiards.tailuge.workers.dev/favicon.png"
          }
        },
        "creator": {
          "@type": "Person",
          "name": "tailuge"
        }
      }
    </script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at center, #8d2ea2 0%, #030712 100%);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        overflow: hidden;
      }
      .launcher-box {
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }
      .header-group {
        text-align: center;
        margin-bottom: 2px;
      }
      .header-title {
        font-size: 20px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #fff;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
      }
      .grid-primary {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        width: 100%;
      }
      .btn-3d {
        position: relative;
        background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.25),
          0 1px 3px rgba(0, 0, 0, 0.4),
          0 6px 12px -3px rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-bottom: 5px solid #040811;
        border-radius: 12px;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: all 0.15s cubic-bezier(0.25, 0.8, 0.25, 1);
        transform: translateY(0);
      }
      .btn-3d:hover {
        transform: translateY(-3px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.25),
          0 4px 8px rgba(0, 0, 0, 0.4),
          0 10px 20px -3px rgba(0, 0, 0, 0.6);
      }
      .btn-3d::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50%;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.08) 0%,
          transparent 100%
        );
        pointer-events: none;
      }
      .btn-3d:active {
        transform: translateY(3px);
        border-bottom-width: 2px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.15),
          0 2px 4px rgba(0, 0, 0, 0.5);
      }
      .img-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15) 0%,
          rgba(255, 255, 255, 0.03) 40%,
          rgba(0, 0, 0, 0.25) 70%,
          rgba(0, 0, 0, 0.4) 100%
        );
        border-radius: 14px;
      }
      .img-container::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.3) 0%,
          rgba(255, 255, 255, 0.08) 25%,
          transparent 45%,
          rgba(0, 0, 0, 0.08) 65%,
          rgba(0, 0, 0, 0.18) 100%
        );
        pointer-events: none;
      }
      .img-container img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.2),
          inset 0 -1px 0 rgba(0, 0, 0, 0.3),
          0 3px 8px rgba(0, 0, 0, 0.3);
        filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.5));
      }
      .lang-card {
        padding: 12px 16px;
        background: rgba(2, 6, 23, 0.7);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        flex-direction: column;
        gap: 2px;
        font-size: 14px;
        text-align: center;
      }
      .lang-card p.primary {
        font-weight: bold;
        color: #fff;
      }
      .btn-3d:hover p.primary {
        color: #10b981;
      }
      .grid-secondary {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        width: 100%;
        margin-top: 2px;
      }
      .sub-3d {
        position: relative;
        background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.15),
          0 4px 10px -2px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: 4px solid #02040a;
        border-radius: 12px;
        text-decoration: none;
        color: inherit;
        text-align: center;
        padding: 8px 6px;
        transition: all 0.1s ease;
      }
      .sub-3d:active {
        transform: translateY(2px);
        border-bottom-width: 2px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          0 2px 4px rgba(0, 0, 0, 0.4);
      }
      .sub-title {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        font-weight: bold;
        font-size: 12px;
        color: #f1f5f9;
      }
      .sub-3d:hover .sub-title {
        color: #10b981;
      }
      .sub-emoji {
        font-size: 13px;
        line-height: 1;
      }
      @media (max-width: 480px) {
        .header-title {
          font-size: 18px;
        }
        .lang-card {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="launcher-box">
      <div class="header-group">
        <h1 class="header-title">Speedrun</h1>
      </div>
      <div class="grid-primary">
        <a
          href="https://billiards.tailuge.workers.dev/speedrun/"
          class="btn-3d"
        >
          <div class="img-container">
            <img
              src="https://billiards.tailuge.workers.dev/images/sr630x500.png"
              alt="Speedrun Billiards"
            />
          </div>
          <div class="lang-card">
            <p class="primary">Play</p>
          </div>
        </a>
      </div>
      <div class="grid-secondary">
        <a href="https://billiards.tailuge.workers.dev/lobby" class="sub-3d">
          <div class="sub-title">
            <span class="sub-emoji">🏠</span>
            <span>Lobby</span>
          </div>
        </a>
      </div>
    </div>
  </body>
</html>
