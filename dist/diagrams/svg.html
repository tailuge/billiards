<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Billiards Trajectory — SVG Diagrams</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #fafafa;
        color: #171717;
        min-height: 100vh;
        padding: 1.5rem;
      }

      @media (width >= 768px) { body { padding: 3rem; } }

      header {
        max-width: 72rem;
        margin: 0 auto 2.5rem;
        text-align: center;
      }


      @media (width >= 768px) { h1 { font-size: 1.875rem; } }

      main {
        max-width: 72rem;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr;
      }

      svg.billiards-table {
        width: 100%;
        height: auto;
        background: #fff;
        border-radius: 0.25rem;
      }

      .table-stroke {
        fill: #fff;
        stroke: #000;
        stroke-width: 0.002;
      }

      .grid-line {
        stroke: #000;
        stroke-width: 0.002;
        stroke-dasharray: 0.004 0.004;
      }

      .trajectory-line {
        fill: none;
        stroke: #000;
        stroke-width: 0.002;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>
        Billiards Diagrams
      </h1>
    </header>

    <main>
      <svg
        class="billiards-table"
        data-shots="
        bottom:0 -> top:1 @2R | 3 oclock max | 20%;
        bottom:0 -> top:2 @2R | 3 oclock max | 20%; 
        bottom:0 -> top:3 @2R | 3 oclock max | 20%; 
        bottom:0 -> top:4 @2R | 3 oclock max | 20%; 
        bottom:0 -> top:5 @2R | 3 oclock max | 20%; 
        bottom:0 -> top:6 @2R | 3 oclock max | 20%; 
        bottom:0 -> top:7 @2R | 3 oclock max | 20%; 
        bottom:0 -> top:8 @2R | 3 oclock max | 20%"
        data-figure="Figure 1.1 - Corner max RHS"
      ></svg>
      <svg
        class="billiards-table"
        data-shots="
        bottom:4 -> top:1 @2R | 3 oclock max | 20%;
        bottom:4 -> top:2 @2R | 3 oclock max | 20%; 
        bottom:4 -> top:3 @2R | 3 oclock max | 20%; 
        bottom:4 -> top:4 @2R | 3 oclock max | 20%; 
        bottom:4 -> top:5 @2R | 3 oclock max | 20%; 
        bottom:4 -> top:6 @2R | 3 oclock max | 20%; 
        bottom:4 -> top:7 @2R | 3 oclock max | 20%; 
        bottom:4 -> top:8 @2R | 3 oclock max | 20%"
        data-figure="Figure 1.2 - Center max RHS"
      ></svg>
    </main>

    <script type="module">
      import { initDiagrams } from "./svg.js"
      initDiagrams()
    </script>
  </body>
</html>
