<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Billiards Trajectory — SVG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .table-stroke {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 0.001;
      }
      .grid-line {
        stroke: #000000;
        stroke-width: 0.001;
        stroke-dasharray: 0.004 0.004;
      }
      .trajectory-line {
        fill: none;
        stroke: #000000;
        stroke-width: 0.001;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </head>
  <body
    class="bg-neutral-50 text-neutral-900 min-h-screen flex flex-col items-center justify-center p-6 md:p-12"
  >
    <main
      class="billiards-table w-full max-w-4xl bg-white p-8 rounded-xl border border-neutral-200 shadow-sm flex flex-col items-center gap-4"
      data-shots="bottom:0 -> top:5 @8R | 3 oclock max | 50%; bottom:2 -> top:3 @8R | 12 oclock 80% | medium"
    >
      <!-- SVG Container -->
      <div class="w-full max-w-2xl">
        <svg
          id="billiard-table-svg"
          xmlns="http://www.w3.org/2000/svg"
          class="w-full h-auto select-none overflow-visible"
        >
          <g id="table-group"></g>
          <g id="trajectories-group"></g>
        </svg>
      </div>
      <!-- Status -->
      <div id="worker-status" class="text-xs text-neutral-500 font-mono">
        Loading worker…
      </div>
    </main>

    <script type="module">
      import { SimulationRunner } from "../ww.js"
      import { parseShots } from "./dsl.js"

      /************************************************************************
       * TABLE GEOMETRY (SI METERS)
       ************************************************************************/
      const R = 0.03275
      const UMB_TABLE_X = 92.36
      const UMB_TABLE_Y = 46.18

      const tableX = R * (UMB_TABLE_X / 2 - 1)
      const tableY = R * (UMB_TABLE_Y / 2 - 1)

      const X = tableX + R
      const Y = tableY + R

      // Fixed calibration (matches default slider midpoints from original)
      const cOffset = 0.06 // cushion thickness
      const dOffset = 0.1 // diamond offset
      const fOffset = 0.18 // outer frame thickness
      const dSize = 0.01 // diamond half-width

      /************************************************************************
       * TABLE RENDERING
       ************************************************************************/
      const tableSvg = document.getElementById("billiard-table-svg")

      function generateBilliardTable() {
        const width = X * 2
        const height = Y * 2

        const maxOffset = Math.max(fOffset, dOffset + 0.015)
        const pad = 0.04
        const viewBoxWidth = (X + maxOffset + pad) * 2
        const viewBoxHeight = (Y + maxOffset + pad) * 2
        const viewBoxX = -viewBoxWidth / 2
        const viewBoxY = -viewBoxHeight / 2

        let svgContent = ""

        // Outer frame
        const fx = -X - fOffset
        const fy = -Y - fOffset
        const fw = width + fOffset * 2
        const fh = height + fOffset * 2
        svgContent += `  <rect id="outer-frame" x="${fx}" y="${fy}" width="${fw}" height="${fh}" class="table-stroke" />\n`

        // Cushion border
        const cx = -X - cOffset
        const cy = -Y - cOffset
        const cw = width + cOffset * 2
        const ch = height + cOffset * 2
        svgContent += `  <rect id="cushion-border" x="${cx}" y="${cy}" width="${cw}" height="${ch}" class="table-stroke" />\n`

        // Playing area
        svgContent += `  <rect id="playing-area" x="${-X}" y="${-Y}" width="${width}" height="${height}" class="table-stroke" />\n`

        // Grid lines
        const gridInterval = (2 * X) / 8
        svgContent += '  <g id="table-grid-lines">\n'
        for (let i = -3; i <= 3; i++) {
          const x = i * gridInterval
          svgContent += `    <line x1="${x}" y1="${-Y}" x2="${x}" y2="${Y}" class="grid-line" />\n`
        }
        for (let i = -1; i <= 1; i++) {
          const y = i * gridInterval
          svgContent += `    <line x1="${-X}" y1="${y}" x2="${X}" y2="${y}" class="grid-line" />\n`
        }
        svgContent += "  </g>\n"

        // Diamonds
        svgContent += '  <g id="diamonds-group">\n'
        function drawDiamond(x, y) {
          return `    <polygon points="${x},${y - dSize} ${x + dSize},${y} ${x},${y + dSize} ${x - dSize},${y}" fill="none" stroke="#000000" stroke-width="0.001" />\n`
        }
        for (let i = -4; i <= 4; i++) {
          const x = i * gridInterval
          svgContent += drawDiamond(x, -Y - dOffset)
          svgContent += drawDiamond(x, Y + dOffset)
        }
        for (let i = -2; i <= 2; i++) {
          const y = i * gridInterval
          svgContent += drawDiamond(-X - dOffset, y)
          svgContent += drawDiamond(X + dOffset, y)
        }
        svgContent += "  </g>\n"

        return {
          viewBox: `${viewBoxX} ${viewBoxY} ${viewBoxWidth} ${viewBoxHeight}`,
          content: svgContent,
        }
      }

      // Render table immediately
      const tableResult = generateBilliardTable()
      tableSvg.setAttribute("viewBox", tableResult.viewBox)
      document.getElementById("table-group").innerHTML = tableResult.content

      /************************************************************************
       * WORKER SIMULATION & TRAJECTORY RENDERING
       ************************************************************************/
      const statusEl = document.getElementById("worker-status")
      const trajectoriesGroup = document.getElementById("trajectories-group")

      function renderTrajectories(results) {
        let svgContent = ""

        results.forEach((result) => {
          // Collect positions for ball 0 only
          const path = []
          result.frames.forEach((frame) => {
            const ball0 = frame.balls.find((b) => b.id === 0)
            if (ball0) path.push(ball0.pos)
          })

          if (path.length < 2) return

          const points = path.map((p) => `${p[0]},${-p[1]}`).join(" ")
          svgContent += `  <polyline points="${points}" class="trajectory-line" />\n`
        })

        trajectoriesGroup.innerHTML = svgContent
      }

      async function runSimulation() {
        // Find all billiards-table divs and parse their data-shots
        const divs = document.querySelectorAll(".billiards-table")
        if (divs.length === 0) {
          statusEl.textContent = "No .billiards-table element found"
          return
        }

        const dslText = divs[0].dataset.shots
        if (!dslText) {
          statusEl.textContent = "No data-shots attribute found"
          return
        }

        let configs
        try {
          configs = parseShots(dslText)
        } catch (err) {
          statusEl.textContent = `DSL parse error: ${err.message}`
          console.error("DSL parse error:", err)
          return
        }

        if (configs.length === 0) {
          statusEl.textContent = "No shots to simulate"
          return
        }

        statusEl.textContent = `Running ${configs.length} simulations…`

        const runner = new SimulationRunner("../worker.js")
        const t0 = performance.now()

        try {
          const tasks = configs.map((config) => runner.spawn(config))
          const results = await Promise.all(tasks)
          const elapsed = Math.round(performance.now() - t0)

          const totalFrames = results.reduce(
            (sum, r) => sum + r.frames.length,
            0
          )
          statusEl.textContent = `Done in ${elapsed}ms — ${results.length} shots, ${totalFrames} total frames`
          renderTrajectories(results)
        } catch (err) {
          statusEl.textContent = `Error: ${err.message}`
          console.error("Simulation failed:", err)
        }
      }

      runSimulation()
    </script>
  </body>
</html>
