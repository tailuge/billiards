<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Export Diagram — Billiards</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 2px;
        padding: 4px;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #f0f0f0;
        color: #000;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0.25rem;
      }

      @media (width >= 768px) {
        body {
          padding: 3rem;
        }
      }

      header {
        text-align: center;
        margin-bottom: 0.5rem;
      }

      h1 {
        font-size: 1.25rem;
        margin: 0;
      }

      svg.billiards-table {
        width: 90%;
        max-width: 48rem;
        height: auto;
        background: #fff;
        border-radius: 0.25rem;
        display: block;
        margin: 0 auto;
      }

      .table-stroke {
        fill: #fff;
        stroke: #000;
        stroke-width: 0.004;
      }

      .grid-line {
        stroke: #ccc;
        stroke-width: 0.002;
        stroke-dasharray: 0.008 0.008;
      }

      .trajectory-line {
        fill: none;
        stroke: #000;
        stroke-width: 0.002;
      }

      #controls {
        margin-top: 1rem;
        text-align: center;
      }

      .btn {
        padding: 8px 20px;
        font-size: 1rem;
        cursor: pointer;
        background: #fff;
        color: #000;
        border: 1px solid #ccc;
        border-radius: 4px;
        transition: background 0.2s;
        margin-left: 8px;
      }

      .btn:first-child {
        margin-left: 0;
      }

      .btn:hover {
        background: #e5e5e5;
      }

      .btn.active {
        background: #000;
        color: #fff;
        border-color: #000;
      }

      .manual-line {
        fill: none;
        stroke: #4f4f4f;
        stroke-width: 0.001;
        stroke-dasharray: 0.06 0.03;
      }

      .fine-stroke {
        stroke: #000;
        stroke-width: 0.001;
        fill: url(#crosshatch);
      }

      .snap-indicator {
        fill: rgba(0, 0, 0, 0.2);
        stroke: none;
      }

      #panels {
        display: flex;
        gap: 1rem;
        width: 100%;
        max-width: 96rem;
        margin-top: 1rem;
        align-items: flex-start;
      }

      #panels > div {
        flex: 1;
        min-width: 0;
        background: #fff;
        border-radius: 0.25rem;
        padding: 0.5rem;
      }

      #panels h2 {
        font-size: 1rem;
        margin: 0 0 0.5rem;
      }

      #panels pre {
        background: #f5f5f5;
        border: 1px solid #ddd;
        border-radius: 0.25rem;
        padding: 0.5rem;
        font-size: 0.7rem;
        line-height: 1.3;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 40vh;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Diagram Export</h1>
    </header>

    <svg class="billiards-table"></svg>

    <div id="controls">
      <button id="play-btn" class="btn">Play in game</button>
      <button id="edit-btn" class="btn">Edit</button>
      <button id="png-btn" class="btn">Open PNG</button>
    </div>

    <div id="panels">
      <div>
        <h2>Simulation SVG</h2>
        <pre id="simulation-json"></pre>
      </div>
      <div>
        <h2>Computed SVG</h2>
        <pre id="computed-svg"></pre>
      </div>
    </div>

    <script type="module">
      import { initDiagrams, toggleEditMode } from "./svg.js"

      const params = new URLSearchParams(window.location.search)

      // Build JSON config from URL params
      const initRaw = params.get("init")
      const initShotRaw = params.get("initShot")
      const cushionModel = params.get("cushionModel") || "mathavan"
      const ruletype = params.get("ruletype") || "threecushion"

      let config = null

      if (!initRaw || !initShotRaw) {
        document.querySelector("header h1").textContent =
          "Missing init or initShot parameters"
      } else {
        const init = JSON.parse(initRaw)
        const initShot = JSON.parse(initShotRaw)

        // Convert flat array [x0,y0,x1,y1,...] to balls array
        const balls = []
        for (let i = 0; i < init.length; i += 2) {
          balls.push({
            id: i / 2,
            pos: { x: init[i], y: init[i + 1], z: 0 },
          })
        }

        config = {
          balls,
          cushionModel,
          ruleType: ruletype,
          shot: {
            cueBallId: 0,
            angle: initShot.angle,
            power: initShot.power,
            offset: initShot.offset,
            elevation: 0,
          },
        }

        const svg = document.querySelector(".billiards-table")
        svg.dataset.jsonShots = JSON.stringify([config])

        // Set figure text from params
        const a = (initShot.angle ?? 0).toFixed(2)
        const p = (initShot.power ?? 0).toFixed(2)
        const figText = `${p} m/s`
        svg.dataset.figure = figText
      }

      function buildStandaloneHtml() {
        const svgElement = document.querySelector(".billiards-table")
        if (!svgElement) return ""
        const clonedSvg = svgElement.cloneNode(true)
        clonedSvg.removeAttribute("data-json-shots")
        // Remove editing group from export
        const editGroup = clonedSvg.querySelector(".editing-group")
        if (editGroup) editGroup.remove()
        return `<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="https://tailuge.github.io/billiards/dist/diagrams/">
    <title>Billiards Diagram — Standalone</title>
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f0f0f0;
      }
      svg.billiards-table {
        width: 90%;
        max-width: 48rem;
        height: auto;
        background: #fff;
        border-radius: 0.25rem;
      }
      .table-stroke {
        fill: #fff;
        stroke: #000;
        stroke-width: 0.004;
      }
      .grid-line {
        stroke: #ccc;
        stroke-width: 0.002;
        stroke-dasharray: 0.008 0.008;
      }
      .trajectory-line {
        fill: none;
        stroke: #000;
        stroke-width: 0.002;
      }
      .manual-line {
        fill: none;
        stroke: #000;
        stroke-width: 0.003;
        stroke-dasharray: 0.06 0.03;
      }
      .fine-stroke {
        stroke: #000;
        stroke-width: 0.001;
        fill: url(#crosshatch);
      }
    </style>
  </head>
  <body>
    ${clonedSvg.outerHTML}
  </body>
</html>`
      }

      function updatePanels() {
        const simEl = document.getElementById("simulation-json")
        const compEl = document.getElementById("computed-svg")
        if (!simEl || !compEl) return

        const svgElement = document.querySelector(".billiards-table")
        if (svgElement) {
          // Simulation SVG: only data attrs + user-drawn manual lines
          const jsonShots = svgElement.dataset.jsonShots
          const figure = svgElement.dataset.figure || ""
          const viewBox = svgElement.getAttribute("viewBox")

          // Collect manual lines from the finalized manual-lines group
          let manualLines = ""
          const manualLinesGroup = svgElement.querySelector(
            ".manual-lines-group"
          )
          if (manualLinesGroup) {
            for (const line of manualLinesGroup.children) {
              manualLines += "\n  " + line.outerHTML
            }
          }

          simEl.textContent =
            `<svg class="billiards-table"\n  data-json-shots='${jsonShots}'\n  data-figure="${figure}"` +
            (viewBox ? `\n  viewBox="${viewBox}"` : "") +
            `\n  xmlns="http://www.w3.org/2000/svg">${manualLines}\n</svg>`
        }

        compEl.textContent = buildStandaloneHtml()
      }

      // Play button — forward to main game
      document.getElementById("play-btn")?.addEventListener("click", () => {
        const url = new URL("../index.html", window.location.href)
        params.forEach((value, key) => {
          url.searchParams.set(key, value)
        })
        url.searchParams.set("practice", "true")
        window.open(url.toString(), "_blank")
      })

      // Open PNG button — generate PNG from SVG and open in new tab
      document
        .getElementById("png-btn")
        ?.addEventListener("click", async () => {
          const svgElement = document.querySelector(".billiards-table")
          if (!svgElement) return

          // Clone and clean up the SVG (remove editing artifacts)
          const clone = svgElement.cloneNode(true)
          const editGroup = clone.querySelector(".editing-group")
          if (editGroup) editGroup.remove()
          clone.removeAttribute("data-json-shots")
          clone.removeAttribute("data-figure")

          // Embed page CSS into the SVG so it renders standalone
          const pageStyle = document.querySelector("style")
          if (pageStyle) {
            const svgStyle = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "style"
            )
            svgStyle.textContent = pageStyle.textContent
            clone.insertBefore(svgStyle, clone.firstChild)
          }

          // Serialize to data URL
          const serializer = new XMLSerializer()
          const svgString = serializer.serializeToString(clone)
          const svgBlob = new Blob([svgString], {
            type: "image/svg+xml;charset=utf-8",
          })
          const svgUrl = URL.createObjectURL(svgBlob)

          // Use the SVG's actual rendered pixel size, not viewBox coordinates
          const rect = svgElement.getBoundingClientRect()
          const width = rect.width * 2
          const height = rect.height * 2

          const canvas = document.createElement("canvas")
          canvas.width = width
          canvas.height = height
          const ctx = canvas.getContext("2d")

          // Set explicit width/height on the clone so it renders at double pixel size
          clone.setAttribute("width", String(width))
          clone.setAttribute("height", String(height))

          const img = new Image()
          img.onload = () => {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height)
            URL.revokeObjectURL(svgUrl)

            canvas.toBlob((blob) => {
              if (!blob) return
              const pngUrl = URL.createObjectURL(blob)
              window.open(pngUrl, "_blank")
              setTimeout(() => URL.revokeObjectURL(pngUrl), 1000)
            }, "image/png")
          }
          img.src = svgUrl
        })

      // Edit button — toggle edit mode and update panels when done
      const editBtn = document.getElementById("edit-btn")
      editBtn?.addEventListener("click", () => {
        const isActive = toggleEditMode()
        editBtn.classList.toggle("active", isActive)
        if (!isActive) {
          // Edit mode just turned off — capture final state
          updatePanels()
        }
      })

      initDiagrams(ruletype)

      // Update panels after simulation renders
      setTimeout(updatePanels, 500)
    </script>
  </body>
</html>
