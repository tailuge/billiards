<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Export Diagram — Billiards</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 2px;
        padding: 4px;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #f0f0f0;
        color: #000;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0.25rem;
      }

      @media (width >= 768px) {
        body {
          padding: 3rem;
        }
      }

      header {
        text-align: center;
        margin-bottom: 0.5rem;
      }

      h1 {
        font-size: 1.25rem;
        margin: 0;
      }

      svg.billiards-table {
        width: 90%;
        max-width: 48rem;
        height: auto;
        background: #fff;
        border-radius: 0.25rem;
        display: block;
        margin: 0 auto;
      }

      .table-stroke {
        fill: #fff;
        stroke: #000;
        stroke-width: 0.004;
      }

      .grid-line {
        stroke: #ccc;
        stroke-width: 0.002;
        stroke-dasharray: 0.008 0.008;
      }

      .trajectory-line {
        fill: none;
        stroke: #000;
        stroke-width: 0.002;
      }

      #controls {
        margin-top: 1rem;
        text-align: center;
      }

      #play-btn {
        padding: 8px 20px;
        font-size: 1rem;
        cursor: pointer;
        background: #888888;
        color: #fff;
        border: none;
        border-radius: 4px;
        transition: background 0.15s;
      }

      #play-btn:hover {
        background: #b8b8b8;
      }

      #edit-btn {
        padding: 8px 20px;
        font-size: 1rem;
        cursor: pointer;
        background: #fff;
        color: #000;
        border: 1px solid #ccc;
        border-radius: 4px;
        transition: background 0.2s;
        margin-left: 8px;
      }

      #edit-btn.active {
        background: #000;
        color: #fff;
        border-color: #000;
      }

      .manual-line {
        fill: none;
        stroke: #000;
        stroke-width: 0.003;
        stroke-dasharray: 0.06 0.03;
      }

      .snap-indicator {
        fill: rgba(0, 0, 0, 0.2);
        stroke: none;
      }

      #export-btn {
        padding: 8px 20px;
        font-size: 1rem;
        cursor: pointer;
        background: #10b981;
        color: #fff;
        border: none;
        border-radius: 4px;
        transition: background 0.15s;
      }

      #export-btn:hover {
        background: #059669;
      }

      #panels {
        display: flex;
        gap: 1rem;
        width: 100%;
        max-width: 96rem;
        margin-top: 1rem;
        align-items: flex-start;
      }

      #panels > div {
        flex: 1;
        min-width: 0;
        background: #fff;
        border-radius: 0.25rem;
        padding: 0.5rem;
      }

      #panels h2 {
        font-size: 1rem;
        margin: 0 0 0.5rem;
      }

      #panels pre {
        background: #f5f5f5;
        border: 1px solid #ddd;
        border-radius: 0.25rem;
        padding: 0.5rem;
        font-size: 0.7rem;
        line-height: 1.3;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 40vh;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Diagram Export</h1>
    </header>

    <svg class="billiards-table"></svg>

    <div id="controls">
      <button id="play-btn">Play in game</button>
      <button id="edit-btn">Edit</button>
    </div>

    <div id="panels">
      <div>
        <h2>Simulation SVG</h2>
        <pre id="simulation-json"></pre>
      </div>
      <div>
        <h2>Computed SVG</h2>
        <pre id="computed-svg"></pre>
      </div>
    </div>

    <script type="module">
      import { initDiagrams, toggleEditMode } from "./svg.js"

      const params = new URLSearchParams(window.location.search)

      // Build JSON config from URL params
      const initRaw = params.get("init")
      const initShotRaw = params.get("initShot")
      const cushionModel = params.get("cushionModel") || "mathavan"
      const ruletype = params.get("ruletype") || "threecushion"

      let config = null

      if (!initRaw || !initShotRaw) {
        document.querySelector("header h1").textContent =
          "Missing init or initShot parameters"
      } else {
        const init = JSON.parse(initRaw)
        const initShot = JSON.parse(initShotRaw)

        // Convert flat array [x0,y0,x1,y1,...] to balls array
        const balls = []
        for (let i = 0; i < init.length; i += 2) {
          balls.push({
            id: i / 2,
            pos: { x: init[i], y: init[i + 1], z: 0 },
          })
        }

        config = {
          balls,
          cushionModel,
          ruleType: ruletype,
          shot: {
            cueBallId: 0,
            angle: initShot.angle,
            power: initShot.power,
            offset: initShot.offset,
            elevation: 0,
          },
        }

        const svg = document.querySelector(".billiards-table")
        svg.dataset.jsonShots = JSON.stringify([config])

        // Set figure text from params
        const a = (initShot.angle ?? 0).toFixed(2)
        const p = (initShot.power ?? 0).toFixed(2)
        const figText = `${p} m/s`
        svg.dataset.figure = figText
      }

      function buildStandaloneHtml() {
        const svgElement = document.querySelector(".billiards-table")
        if (!svgElement) return ""
        const clonedSvg = svgElement.cloneNode(true)
        clonedSvg.removeAttribute("data-json-shots")
        // Remove editing group from export
        const editGroup = clonedSvg.querySelector(".editing-group")
        if (editGroup) editGroup.remove()
        return `<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="https://tailuge.github.io/billiards/dist/diagrams/">
    <title>Billiards Diagram — Standalone</title>
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f0f0f0;
      }
      svg.billiards-table {
        width: 90%;
        max-width: 48rem;
        height: auto;
        background: #fff;
        border-radius: 0.25rem;
      }
      .table-stroke {
        fill: #fff;
        stroke: #000;
        stroke-width: 0.004;
      }
      .grid-line {
        stroke: #ccc;
        stroke-width: 0.002;
        stroke-dasharray: 0.008 0.008;
      }
      .trajectory-line {
        fill: none;
        stroke: #000;
        stroke-width: 0.002;
      }
      .manual-line {
        fill: none;
        stroke: #000;
        stroke-width: 0.003;
        stroke-dasharray: 0.06 0.03;
      }
    </style>
  </head>
  <body>
    ${clonedSvg.outerHTML}
  </body>
</html>`
      }

      function updatePanels() {
        const simEl = document.getElementById("simulation-json")
        const compEl = document.getElementById("computed-svg")
        if (!simEl || !compEl) return

        const svgElement = document.querySelector(".billiards-table")
        if (svgElement) {
          // Simulation SVG: output the full SVG element including manual lines
          const clone = svgElement.cloneNode(true)
          // Remove editing group so temp state isn't included
          const editGroup = clone.querySelector(".editing-group")
          if (editGroup) editGroup.remove()
          // Use single quotes for data-json-shots to avoid escaping JSON quotes
          const jsonShots = clone.dataset.jsonShots
          const figure = clone.dataset.figure || ""
          clone.removeAttribute("data-json-shots")
          clone.removeAttribute("data-figure")
          simEl.textContent = clone.outerHTML.replace(
            /<svg /,
            `<svg data-json-shots='${jsonShots}' data-figure="${figure}" `
          )
        }

        compEl.textContent = buildStandaloneHtml()
      }

      // Play button — forward to main game
      document.getElementById("play-btn")?.addEventListener("click", () => {
        const url = new URL("../index.html", window.location.href)
        params.forEach((value, key) => {
          url.searchParams.set(key, value)
        })
        url.searchParams.set("practice", "true")
        window.open(url.toString(), "_blank")
      })

      // Edit button — toggle edit mode and update panels when done
      const editBtn = document.getElementById("edit-btn")
      editBtn?.addEventListener("click", () => {
        const isActive = toggleEditMode()
        editBtn.classList.toggle("active", isActive)
        if (!isActive) {
          // Edit mode just turned off — capture final state
          updatePanels()
        }
      })

      initDiagrams()

      // Update panels after simulation renders
      setTimeout(updatePanels, 500)
    </script>
  </body>
</html>
