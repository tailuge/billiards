    <div id="failModal">
      <div class="fail-card">
        <h2>Attempt Failed</h2>
        <p id="failReason"></p>
        <button id="failOkBtn">OK</button>
      </div>
    </div>

    <div id="gameOverlay">
      <button class="close-btn" id="closeGame">✕</button>
      <div class="iframe-container">
        <div class="timer-display" id="timerDisplay">0.0s</div>
        <iframe id="gameIframe" src=""></iframe>
      </div>
    </div>

    <script type="module">
      import { initSpeedrun } from "./speedrun.js"
      initSpeedrun()
    </script>
  </body>
</html>
