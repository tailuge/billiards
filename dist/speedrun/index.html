<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speedrun Challenge</title>
    <link rel="stylesheet" href="../css/ball-colors.css" />
    <link rel="stylesheet" href="speedrun.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱</text></svg>"
    />
  </head>

  <body>
    <header>
      <h1>Speedrun Challenge</h1>
      <p id="playerName">Player: Anon</p>
    </header>

    <main class="card-grid">
      <article class="speedrun-card" id="card-nineball-break">
        <svg
          class="billiards-table"
          data-json-shots='[{"balls":[{"id":0,"pos":{"x":0.7250000238418579,"y":0,"z":0}},{"id":1,"pos":{"x":0.00559999980032444,"y":-0.6764000058174133,"z":0}},{"id":2,"pos":{"x":-1.3660999536514282,"y":-0.6614999771118164,"z":0}},{"id":3,"pos":{"x":-1.28410005569458,"y":0.5717999935150146,"z":0}},{"id":4,"pos":{"x":-0.0019000000320374966,"y":0.6651999950408936,"z":0}},{"id":5,"pos":{"x":1.3549000024795532,"y":0.6503000259399414,"z":0}},{"id":6,"pos":{"x":1.280400037765503,"y":-0.579200029373169,"z":0}},{"id":7,"pos":{"x":1.340000033378601,"y":-0.631600022315979,"z":0}},{"id":8,"pos":{"x":-1.3437000513076782,"y":0.6277999877929688,"z":0}},{"id":9,"pos":{"x":-0.0019000000320374966,"y":0,"z":0}}],"cushionModel":"mathavan","ruleType":"nineball","shot":{"cueBallId":0,"angle":-2.408951997756958,"power":2.1,"offset":{"x":-0.10180995613336563,"y":-0.2828054428100586},"elevation":0}}]'
          data-position-id="nineball-break"
          data-label="Nineball Break"
          data-description="Standard nineball rack. Pot the 9-ball as fast as you can."
        ></svg>
        <h3 class="card-title">Nineball Break</h3>
        <p class="card-desc">Standard nineball rack. Pot the 9-ball as fast as you can.</p>
        <button class="play-btn">Play</button>
        <div class="rankings">
          <h4>Rankings</h4>
          <p class="rankings-empty">— No results yet —</p>
        </div>
      </article>
    </main>

    <div id="gameOverlay">
      <button class="close-btn" id="closeGame">✕</button>
      <div class="iframe-container">
        <div class="timer-display" id="timerDisplay">0.0s</div>
        <iframe id="gameIframe" src=""></iframe>
      </div>
    </div>

    <script type="module">
      import { initSpeedrun } from "./speedrun.js"
      initSpeedrun()
    </script>
  </body>
</html>
