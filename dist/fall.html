<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Particles - Instanced Optimized - Z-Up</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020202; cursor: ns-resize; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        class ParticleUtils {
            static generateTextCanvas(text, width, height, fontStack) {
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, width, height);
                let fontSize = 60;
                ctx.font = `bold ${fontSize}px ${fontStack}`;
                while (fontSize > 5) {
                    ctx.font = `bold ${fontSize}px ${fontStack}`;
                    const metrics = ctx.measureText(text);
                    if (metrics.width < width * 0.9 && fontSize * 0.8 < height * 0.8) break;
                    fontSize--;
                }
                ctx.fillStyle = "black";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(text, width / 2, height / 2);
                return canvas;
            }
        }

        /**
         * Optimized ParticleSystem using THREE.InstancedMesh.
         * Collapses thousands of draw calls into ONE.
         */
        class ParticleSystem {
            constructor(scene, sourceCanvas, config) {
                this.scene = scene;
                this.config = {
                    tableWidth: 88,
                    tableLength: 44,
                    tableZ: 30,
                    scaleX: 1.0,
                    scaleY: 1.0,
                    stopThreshold: 0.5,
                    gravity: -12.375,
                    baseRestitution: 0.55,
                    restitutionVariance: 0.35,
                    ...config
                };

                this.count = this.config.tableWidth * this.config.tableLength;
                this.particles = [];
                this.dummy = new THREE.Object3D();
                this.stopZ = this.config.tableZ + 0.1;
                
                this._init(sourceCanvas);
            }

            _init(canvas) {
                const ctx = canvas.getContext('2d');
                const imgData = ctx.getImageData(0, 0, this.config.tableWidth, this.config.tableLength).data;
                
                const geo = new THREE.BufferGeometry();
                const vertices = new Float32Array([-0.5, -0.5, 0, 0.5, -0.5, 0, 0, 0.5, 0]);
                geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                geo.computeVertexNormals();

                const mat = new THREE.MeshStandardMaterial({ 
                    side: THREE.DoubleSide,
                    flatShading: true,
                    metalness: 0,
                    roughness: 0.8
                });

                this.instancedMesh = new THREE.InstancedMesh(geo, mat, this.count);
                this.instancedMesh.castShadow = true;
                this.instancedMesh.receiveShadow = true;
                this.scene.add(this.instancedMesh);

                for (let i = 0; i < this.count; i++) {
                    const x = i % this.config.tableWidth;
                    const y = Math.floor(i / this.config.tableWidth);
                    const idx = i * 4;
                    
                    const color = new THREE.Color(`rgb(${imgData[idx]},${imgData[idx+1]},${imgData[idx+2]})`);
                    this.instancedMesh.setColorAt(i, color);

                    const worldX = (x - (this.config.tableWidth / 2)) * this.config.scaleX;
                    const worldY = ((this.config.tableLength / 2) - y) * this.config.scaleY;
                    const worldZ = 80 + Math.random() * 50;

                    const p = {
                        pos: new THREE.Vector3(worldX, worldY, worldZ),
                        rot: new THREE.Euler(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI),
                        velZ: 0,
                        rotVel: new THREE.Vector3(
                            (Math.random() - 0.5) * 15,
                            (Math.random() - 0.5) * 15,
                            (Math.random() - 0.5) * 15
                        ),
                        delay: Math.random() * 5,
                        age: 0,
                        active: false,
                        settled: false
                    };
                    this.particles.push(p);
                    
                    // Initial Transform
                    this.dummy.position.copy(p.pos);
                    this.dummy.rotation.copy(p.rot);
                    this.dummy.updateMatrix();
                    this.instancedMesh.setMatrixAt(i, this.dummy.matrix);
                }
            }

            dispose() {
                if (this.instancedMesh) {
                    this.scene.remove(this.instancedMesh);
                    this.instancedMesh.geometry.dispose();
                    this.instancedMesh.material.dispose();
                }
                this.particles = [];
                this.scene = null;
            }

            update(dt) {
                if (!this.scene) return;
                const safeDt = Math.min(dt, 0.1);
                let needsUpdate = false;

                for (let i = 0; i < this.count; i++) {
                    const p = this.particles[i];
                    if (p.settled) continue;

                    p.age += safeDt;
                    if (!p.active) {
                        if (p.age > p.delay) p.active = true;
                        else continue;
                    }

                    needsUpdate = true;
                    p.velZ += this.config.gravity * safeDt;
                    p.pos.z += p.velZ * safeDt;

                    p.rot.x += p.rotVel.x * safeDt;
                    p.rot.y += p.rotVel.y * safeDt;
                    p.rot.z += p.rotVel.z * safeDt;

                    if (p.pos.z <= this.stopZ) {
                        p.pos.z = this.stopZ;
                        if (Math.abs(p.velZ) < this.config.stopThreshold) {
                            p.velZ = 0;
                            p.settled = true;
                        } else {
                            const varFactor = (Math.random() * (this.config.restitutionVariance * 2)) - this.config.restitutionVariance;
                            p.velZ = -p.velZ * (this.config.baseRestitution * (1 + varFactor));
                            p.rotVel.multiplyScalar(0.5);
                        }
                    }

                    this.dummy.position.copy(p.pos);
                    this.dummy.rotation.copy(p.rot);
                    this.dummy.updateMatrix();
                    this.instancedMesh.setMatrixAt(i, this.dummy.matrix);
                }

                if (needsUpdate) {
                    this.instancedMesh.instanceMatrix.needsUpdate = true;
                }
            }
        }

        let scene, camera, renderer, clock, system;
        let orbitRadius = 150;
        let totalElapsed = 0;

        function init() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
            camera.up.set(0, 0, 1);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.4);
            sun.position.set(50, -50, 150);
            sun.castShadow = true;
            scene.add(sun);

            const felt = new THREE.Mesh(
                new THREE.BoxGeometry(88, 44, 2),
                new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1 })
            );
            felt.position.z = 29; 
            felt.receiveShadow = true;
            scene.add(felt);

            const grid = new THREE.GridHelper(300, 30, 0x222222, 0x111111);
            grid.rotation.x = Math.PI / 2;
            scene.add(grid);

            const sourceCanvas = ParticleUtils.generateTextCanvas("🇬🇧-龍", 88, 44, "bold sans-serif");
            system = new ParticleSystem(scene, sourceCanvas, { scaleX: 1.0 });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            totalElapsed += dt;
            if (system) system.update(dt);
            
            const angle = totalElapsed * 0.15;
            camera.position.x = Math.cos(angle) * orbitRadius;
            camera.position.y = Math.sin(angle) * orbitRadius;
            camera.position.z = orbitRadius * 0.66;
            camera.lookAt(0, 0, 30);
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
