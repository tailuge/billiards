<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dragon Particles - Instanced Optimized - Z-Up</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #020202;
        cursor: ns-resize;
      }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      class ParticleUtils {
        static generateTextCanvas(text, width, height, fontStack) {
          const canvas = document.createElement("canvas")
          canvas.width = width
          canvas.height = height
          const ctx = canvas.getContext("2d")
          ctx.fillStyle = "white"
          ctx.fillRect(0, 0, width, height)
          let fontSize = 60
          ctx.font = `bold ${fontSize}px ${fontStack}`
          while (fontSize > 5) {
            ctx.font = `bold ${fontSize}px ${fontStack}`
            const metrics = ctx.measureText(text)
            if (metrics.width < width * 0.9 && fontSize * 0.8 < height * 0.8)
              break
            fontSize--
          }
          ctx.fillStyle = "black"
          ctx.textAlign = "center"
          ctx.textBaseline = "middle"
          ctx.fillText(text, width / 2, height / 2)
          return canvas
        }
      }

      /**
       * Optimized ParticleSystem using THREE.InstancedMesh.
       * Collapses thousands of draw calls into ONE.
       */
      class ParticleSystem {
        constructor(scene, sourceCanvas, config) {
          this.scene = scene
          this.config = {
            tableWidth: 88,
            tableLength: 44,
            tableZ: 30,
            scaleX: 1.0,
            scaleY: 1.0,
            stopThreshold: 0.5,
            gravity: -12.375,
            baseRestitution: 0.55,
            restitutionVariance: 0.35,
            ...config,
          }

          this.count = this.config.tableWidth * this.config.tableLength
          this.pPosX = new Float32Array(this.count)
          this.pPosY = new Float32Array(this.count)
          this.pPosZ = new Float32Array(this.count)
          this.pRot = new Float32Array(this.count * 3)
          this.pVelZ = new Float32Array(this.count)
          this.pRotVel = new Float32Array(this.count * 3)
          this.pDelay = new Float32Array(this.count)
          this.pAge = new Float32Array(this.count)
          this.pState = new Uint8Array(this.count) // 0: waiting, 1: active, 2: settled
          this.dummy = new THREE.Object3D()
          this.stopZ = this.config.tableZ + 0.1

          this._init(sourceCanvas)
        }

        _init(canvas) {
          const ctx = canvas.getContext("2d")
          const imgData = ctx.getImageData(
            0,
            0,
            this.config.tableWidth,
            this.config.tableLength
          ).data

          const geo = new THREE.BufferGeometry()
          const vertices = new Float32Array([
            -0.5, -0.5, 0, 0.5, -0.5, 0, 0, 0.5, 0,
          ])
          geo.setAttribute("position", new THREE.BufferAttribute(vertices, 3))
          geo.computeVertexNormals()

          const mat = new THREE.MeshLambertMaterial({
            side: THREE.DoubleSide,
          })

          this.instancedMesh = new THREE.InstancedMesh(geo, mat, this.count)
          this.instancedMesh.castShadow = true
          this.instancedMesh.receiveShadow = true
          this.scene.add(this.instancedMesh)

          const color = new THREE.Color()
          for (let i = 0; i < this.count; i++) {
            const x = i % this.config.tableWidth
            const y = Math.floor(i / this.config.tableWidth)
            const idx = i * 4

            color.setRGB(
              imgData[idx] / 255,
              imgData[idx + 1] / 255,
              imgData[idx + 2] / 255
            )
            this.instancedMesh.setColorAt(i, color)

            this.pPosX[i] =
              (x - this.config.tableWidth / 2) * this.config.scaleX
            this.pPosY[i] =
              (this.config.tableLength / 2 - y) * this.config.scaleY
            this.pPosZ[i] = 80 + Math.random() * 50

            this.pRot[i * 3] = Math.random() * Math.PI
            this.pRot[i * 3 + 1] = Math.random() * Math.PI
            this.pRot[i * 3 + 2] = Math.random() * Math.PI

            this.pVelZ[i] = 0
            this.pRotVel[i * 3] = (Math.random() - 0.5) * 15
            this.pRotVel[i * 3 + 1] = (Math.random() - 0.5) * 15
            this.pRotVel[i * 3 + 2] = (Math.random() - 0.5) * 15

            this.pDelay[i] = Math.random() * 5
            this.pAge[i] = 0
            this.pState[i] = 0 // waiting

            // Initial Transform
            this.dummy.position.set(this.pPosX[i], this.pPosY[i], this.pPosZ[i])
            this.dummy.rotation.set(
              this.pRot[i * 3],
              this.pRot[i * 3 + 1],
              this.pRot[i * 3 + 2]
            )
            this.dummy.updateMatrix()
            this.instancedMesh.setMatrixAt(i, this.dummy.matrix)
          }
        }

        dispose() {
          if (this.instancedMesh) {
            this.scene.remove(this.instancedMesh)
            this.instancedMesh.geometry.dispose()
            this.instancedMesh.material.dispose()
          }
          this.pPosX =
            this.pPosY =
            this.pPosZ =
            this.pRot =
            this.pVelZ =
            this.pRotVel =
            this.pDelay =
            this.pAge =
            this.pState =
              null
          this.scene = null
        }

        update(dt) {
          if (!this.scene) return
          const safeDt = Math.min(dt, 0.1)
          let needsUpdate = false

          for (let i = 0; i < this.count; i++) {
            if (this.pState[i] === 2) continue // settled

            this.pAge[i] += safeDt
            if (this.pState[i] === 0) {
              // waiting
              if (this.pAge[i] > this.pDelay[i]) {
                this.pState[i] = 1 // active
              } else {
                continue
              }
            }

            needsUpdate = true
            this.pVelZ[i] += this.config.gravity * safeDt
            this.pPosZ[i] += this.pVelZ[i] * safeDt

            this.pRot[i * 3] += this.pRotVel[i * 3] * safeDt
            this.pRot[i * 3 + 1] += this.pRotVel[i * 3 + 1] * safeDt
            this.pRot[i * 3 + 2] += this.pRotVel[i * 3 + 2] * safeDt

            if (this.pPosZ[i] <= this.stopZ) {
              this.pPosZ[i] = this.stopZ
              if (Math.abs(this.pVelZ[i]) < this.config.stopThreshold) {
                this.pVelZ[i] = 0
                this.pState[i] = 2 // settled
              } else {
                const varFactor =
                  Math.random() * (this.config.restitutionVariance * 2) -
                  this.config.restitutionVariance
                this.pVelZ[i] =
                  -this.pVelZ[i] *
                  (this.config.baseRestitution * (1 + varFactor))
                this.pRotVel[i * 3] *= 0.5
                this.pRotVel[i * 3 + 1] *= 0.5
                this.pRotVel[i * 3 + 2] *= 0.5
              }
            }

            this.dummy.position.set(this.pPosX[i], this.pPosY[i], this.pPosZ[i])
            this.dummy.rotation.set(
              this.pRot[i * 3],
              this.pRot[i * 3 + 1],
              this.pRot[i * 3 + 2]
            )
            this.dummy.updateMatrix()
            this.instancedMesh.setMatrixAt(i, this.dummy.matrix)
          }

          if (needsUpdate) {
            this.instancedMesh.instanceMatrix.needsUpdate = true
          }
        }
      }

      let scene, camera, renderer, clock, system
      let orbitRadius = 150
      let totalElapsed = 0

      function init() {
        scene = new THREE.Scene()
        clock = new THREE.Clock()
        camera = new THREE.PerspectiveCamera(
          45,
          window.innerWidth / window.innerHeight,
          1,
          2000
        )
        camera.up.set(0, 0, 1)

        renderer = new THREE.WebGLRenderer({
          antialias: false,
          powerPreference: "high-performance",
        })
        renderer.setPixelRatio(1)
        renderer.setSize(window.innerWidth, window.innerHeight)
        renderer.shadowMap.enabled = true
        renderer.shadowMap.type = THREE.BasicShadowMap
        document.body.appendChild(renderer.domElement)

        scene.add(new THREE.AmbientLight(0xffffff, 0.7))
        const sun = new THREE.DirectionalLight(0xffffff, 0.4)
        sun.position.set(50, -50, 150)
        sun.castShadow = true
        scene.add(sun)

        const felt = new THREE.Mesh(
          new THREE.BoxGeometry(88, 44, 2),
          new THREE.MeshLambertMaterial({ color: 0x111111 })
        )
        felt.position.z = 29
        felt.receiveShadow = true
        scene.add(felt)

        const grid = new THREE.GridHelper(300, 30, 0x222222, 0x111111)
        grid.rotation.x = Math.PI / 2
        scene.add(grid)

        const sourceCanvas = ParticleUtils.generateTextCanvas(
          "🇬🇧-龍",
          88,
          44,
          "bold sans-serif"
        )
        system = new ParticleSystem(scene, sourceCanvas, { scaleX: 1.0 })

        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight
          camera.updateProjectionMatrix()
          renderer.setSize(window.innerWidth, window.innerHeight)
        })

        animate()
      }

      function animate() {
        requestAnimationFrame(animate)
        const dt = clock.getDelta()
        totalElapsed += dt
        if (system) system.update(dt)

        const angle = totalElapsed * 0.15
        camera.position.x = Math.cos(angle) * orbitRadius
        camera.position.y = Math.sin(angle) * orbitRadius
        camera.position.z = orbitRadius * 0.66
        camera.lookAt(0, 0, 30)
        renderer.render(scene, camera)
      }

      window.onload = init
    </script>
  </body>
</html>
