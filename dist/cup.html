<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procedural Metallic Trophies</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #e2e2e2;
        font-family: sans-serif;
        touch-action: none;
      }
      canvas {
        display: block;
      }
      .ui {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 10;
      }
      button {
        background: #222;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: background 0.2s;
      }
      button:hover {
        background: #444;
      }
      .hint {
        color: #333;
        font-size: 12px;
        font-weight: 500;
        background: rgba(255, 255, 255, 0.8);
        padding: 8px 16px;
        border-radius: 20px;
        backdrop-filter: blur(4px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="ui">
      <div class="hint">
        Left Click: Orbit • Right Click: Pan • Scroll: Zoom
      </div>
      <button onclick="generateNew()">New Design</button>
    </div>

    <script>
      let scene, camera, renderer, trophyGroup, controls
      let seed = Math.floor(Math.random() * 999999)

      const REQUESTED_FLAGS = ["🇬🇧", "🇯🇵"]

      function random(min, max) {
        const x = Math.sin(seed++) * 10000
        const r = x - Math.floor(x)
        return min + r * (max - min)
      }

      function init() {
        scene = new THREE.Scene()
        scene.background = new THREE.Color(0xf0f0f0)
        scene.fog = new THREE.Fog(0xf0f0f0, 10, 60)

        camera = new THREE.PerspectiveCamera(
          30,
          window.innerWidth / window.innerHeight,
          0.1,
          200
        )
        camera.position.set(0, 5, 18)

        renderer = new THREE.WebGLRenderer({ antialias: true })
        renderer.setSize(window.innerWidth, window.innerHeight)
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
        renderer.outputEncoding = THREE.sRGBEncoding
        renderer.shadowMap.enabled = true
        document.body.appendChild(renderer.domElement)

        controls = new THREE.OrbitControls(camera, renderer.domElement)
        controls.enableDamping = true
        controls.dampingFactor = 0.05
        controls.target.set(0, 2.5, 0)
        controls.autoRotate = true
        controls.autoRotateSpeed = 1.5

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x888888, 1.2)
        scene.add(hemiLight)

        const keyLight = new THREE.DirectionalLight(0xffffff, 1.2)
        keyLight.position.set(10, 20, 15)
        keyLight.castShadow = true
        scene.add(keyLight)

        const floorGeo = new THREE.PlaneGeometry(300, 300)
        const floorMat = new THREE.MeshStandardMaterial({
          color: 0xdcdcdc,
          roughness: 1.0,
        })
        const floor = new THREE.Mesh(floorGeo, floorMat)
        floor.rotation.x = -Math.PI / 2
        floor.receiveShadow = true
        scene.add(floor)

        trophyGroup = new THREE.Group()
        scene.add(trophyGroup)

        createTrophy(REQUESTED_FLAGS)

        window.addEventListener("resize", onWindowResize)
        controls.addEventListener("start", () => {
          controls.autoRotate = false
        })
        animate()
      }

      function createFlagTexture(flags) {
        const canvas = document.createElement("canvas")
        canvas.width = 512
        canvas.height = 64
        const ctx = canvas.getContext("2d")

        // Wood background
        ctx.fillStyle = "#5c3a21"
        ctx.fillRect(0, 0, canvas.width, canvas.height)

        ctx.textAlign = "center"
        ctx.textBaseline = "middle"

        const step = canvas.width / flags.length
        flags.forEach((flag, i) => {
          ctx.save()
          // Center in segment
          ctx.translate(step * (i + 0.5), canvas.height / 2)
          // scale(widthFactor, heightFactor)
          // Height is 1.8x, width is now 1.2x (20% increase)
          ctx.scale(1.2, 1.8)
          ctx.font = "36px serif"
          ctx.fillText(flag, 0, 0)
          ctx.restore()
        })

        const texture = new THREE.CanvasTexture(canvas)
        texture.wrapS = THREE.RepeatWrapping
        texture.minFilter = THREE.LinearFilter
        texture.magFilter = THREE.LinearFilter
        return texture
      }

      function getMetallicColor() {
        return random(0, 1) > 0.5
          ? new THREE.Color(0xffd700)
          : new THREE.Color(0xf0f0f0)
      }

      function createTrophy(flags) {
        while (trophyGroup.children.length > 0)
          trophyGroup.remove(trophyGroup.children[0])

        const segments = Math.floor(random(16, 32))
        const layers = 50
        const maxHeight = random(3.5, 5.0)
        const baseRadius = random(0.6, 0.9)
        const freq = random(1.5, 3.5)
        const amp = random(0.1, 0.3)

        const points = []
        for (let i = 0; i <= layers; i++) {
          const t = i / layers
          let r = baseRadius * (1.0 + Math.sin(t * Math.PI * freq) * amp)
          if (t > 0.1 && t < 0.7)
            r *= 0.5 + Math.pow(Math.sin(t * Math.PI), 1.5) * 0.5
          if (t > 0.92) r += ((t - 0.92) / 0.08) * 0.6
          points.push(new THREE.Vector2(Math.max(0.1, r), t * maxHeight))
        }

        const geometry = new THREE.LatheGeometry(points, segments)
        const material = new THREE.MeshStandardMaterial({
          color: getMetallicColor(),
          flatShading: true,
          metalness: 0.5,
          roughness: 0.15,
          side: THREE.DoubleSide,
        })

        const mesh = new THREE.Mesh(geometry, material)
        mesh.castShadow = true
        mesh.position.y = 0.9
        trophyGroup.add(mesh)

        // Side Item
        if (random(0, 1) > 0.3) {
          const yPos = maxHeight * random(0.4, 0.7) + 0.9
          const xOffset = baseRadius * random(0.8, 1.2)
          let sideMesh
          if (random(0, 1) > 0.5) {
            sideMesh = new THREE.Mesh(
              new THREE.ConeGeometry(baseRadius * 0.4, maxHeight * 0.4, 3),
              material
            )
            sideMesh.rotation.z = -Math.PI / 4
          } else {
            sideMesh = new THREE.Mesh(
              new THREE.TorusGeometry(baseRadius * 0.6, 0.1, 4, 8),
              material
            )
          }
          sideMesh.position.set(xOffset, yPos, 0)
          sideMesh.castShadow = true
          trophyGroup.add(sideMesh)
        }

        const woodMat = new THREE.MeshStandardMaterial({
          color: 0x5c3a21,
          roughness: 0.9,
          flatShading: true,
        })

        const flagTex = createFlagTexture(flags)
        const flagMat = new THREE.MeshStandardMaterial({
          map: flagTex,
          roughness: 0.8,
          transparent: false,
        })

        const plinthBase = new THREE.Mesh(
          new THREE.CylinderGeometry(
            baseRadius * 1.5,
            baseRadius * 1.6,
            0.3,
            segments
          ),
          woodMat
        )
        plinthBase.position.y = 0.15
        plinthBase.castShadow = true
        plinthBase.receiveShadow = true
        trophyGroup.add(plinthBase)

        const plinthTopHeight = 0.6
        const plinthTop = new THREE.Mesh(
          new THREE.CylinderGeometry(
            baseRadius * 1.2,
            baseRadius * 1.3,
            plinthTopHeight,
            segments
          ),
          flagMat
        )
        plinthTop.position.y = 0.3 + plinthTopHeight / 2
        plinthTop.castShadow = true
        plinthTop.receiveShadow = true
        trophyGroup.add(plinthTop)
      }

      function generateNew() {
        seed = Math.floor(Math.random() * 999999)
        controls.autoRotate = true
        createTrophy(REQUESTED_FLAGS)
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight
        camera.updateProjectionMatrix()
        renderer.setSize(window.innerWidth, window.innerHeight)
      }

      function animate() {
        requestAnimationFrame(animate)
        controls.update()
        renderer.render(scene, camera)
      }

      init()
    </script>
  </body>
</html>
