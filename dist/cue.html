<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snooker Cue Slider</title>
    <style>
      :root {
        --bg-color: #1a1a1a;
        --accent-tan: #c19a6b;

        /* State: Power percentage (0-100) */
        --p: 35%;
        --p-inv: 65%;

        /* Theme Colors */
        --wood-dark: #3e2711;
        --wood-light: #5d3a1a;
        --tip-blue: #357abd;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg-color);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        gap: 24px;
        /* Prevent accidental pull-to-refresh on some mobile browsers during sliding */
        overscroll-behavior: none;
        touch-action: manipulation;
      }

      /* 1. Main Slider Container */
      .cue-container {
        height: 44px; /* Slightly taller for better touch target (min 44px recommended) */
        width: 90%;
        max-width: 450px;
        display: flex;
        position: relative;
        padding: 0;
        background: #25180a;
        border: 4px solid #5d3a1a;
        border-radius: 4px;
        overflow: hidden;
        box-sizing: border-box;
      }

      /* 2. Flat Power Triangle (Sits behind the cue) */
      .power-track {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        clip-path: polygon(0 100%, 100% 100%, 100% 0);
        background: linear-gradient(
          to right,
          rgba(255, 0, 0, 0.9) 0%,
          #ffff00 100%
        );
      }

      /* 3. The Functional Range Input */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 100%;
        background: transparent;
        cursor: pointer;
        margin: 0;
        outline: none;
        position: relative;
        z-index: 2;
      }

      /* Webkit Track (Chrome, Safari, Edge, Opera) */
      input[type="range"]::-webkit-slider-runnable-track {
        width: 100%;
        height: 100%;
        background:
          linear-gradient(
              to bottom,
              rgba(0, 0, 0, 0.8) 0%,
              rgba(0, 0, 0, 0.2) 15%,
              rgba(255, 230, 200, 0.3) 40%,
              rgba(255, 230, 200, 0.3) 60%,
              rgba(0, 0, 0, 0.2) 85%,
              rgba(0, 0, 0, 0.8) 100%
            )
            no-repeat 100% 0 / var(--p-inv) 100%,
          linear-gradient(
            to right,
            transparent var(--p),
            var(--accent-tan) var(--p)
          );
      }

      /* Firefox Track */
      input[type="range"]::-moz-range-track {
        width: 100%;
        height: 100%;
        background:
          linear-gradient(
              to bottom,
              rgba(0, 0, 0, 0.8) 0%,
              rgba(0, 0, 0, 0.2) 15%,
              rgba(255, 230, 200, 0.3) 40%,
              rgba(255, 230, 200, 0.3) 60%,
              rgba(0, 0, 0, 0.2) 85%,
              rgba(0, 0, 0, 0.8) 100%
            )
            no-repeat 100% 0 / var(--p-inv) 100%,
          linear-gradient(
            to right,
            transparent var(--p),
            var(--accent-tan) var(--p)
          );
      }

      /* Thumb Styling (The Tip) */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        height: 100%;
        width: 36px;
        background:
          linear-gradient(
            to bottom,
            rgba(0, 0, 0, 0.8) 0%,
            rgba(0, 0, 0, 0.2) 15%,
            rgba(255, 230, 200, 0.3) 40%,
            rgba(255, 230, 200, 0.3) 60%,
            rgba(0, 0, 0, 0.2) 85%,
            rgba(0, 0, 0, 0.8) 100%
          ),
          linear-gradient(to right, var(--tip-blue) 25%, #fff 0);
        border: none;
        border-left: 2px solid #000;
        cursor: grab;
      }

      input[type="range"]::-moz-range-thumb {
        height: 100%;
        width: 36px;
        background:
          linear-gradient(
            to bottom,
            rgba(0, 0, 0, 0.8) 0%,
            rgba(0, 0, 0, 0.2) 15%,
            rgba(255, 230, 200, 0.3) 40%,
            rgba(255, 230, 200, 0.3) 60%,
            rgba(0, 0, 0, 0.2) 85%,
            rgba(0, 0, 0, 0.8) 100%
          ),
          linear-gradient(to right, var(--tip-blue) 25%, #fff 0);
        border: none;
        border-left: 2px solid #000;
        border-radius: 0;
        cursor: grab;
      }

      input[type="range"]:active::-webkit-slider-thumb,
      input[type="range"]:active::-moz-range-thumb {
        cursor: grabbing;
      }

      button {
        padding: 12px 40px;
        background: var(--wood-light);
        color: var(--cue-tan);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        cursor: pointer;
        font-weight: 900;
        text-transform: uppercase;
        box-shadow: 0 4px 0 var(--wood-dark);
        transition: transform 0.05s;
      }

      button:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 var(--wood-dark);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="cue-container">
      <div class="power-track"></div>
      <input type="range" id="s" value="35" min="0" max="100" step="0.1" />
    </div>

    <button id="hitBtn">Hit</button>

    <script>
      /**
       * SNOOKER CUE SLIDER LOGIC
       * - Modularized for easy reuse.
       * - Optimized for cross-browser performance using CSS Variables.
       */
      const slider = document.getElementById("s")
      const btn = document.getElementById("hitBtn")
      let animId = null

      /**
       * Synchronizes the UI state with the value.
       * Updates the CSS variable --p which controls the shaft "reveal".
       */
      const updateValue = (val) => {
        slider.value = val
        document.documentElement.style.setProperty("--p", val + "%")
        document.documentElement.style.setProperty("--p-inv", 100 - val + "%")
      }

      // Listen for manual user input
      slider.addEventListener("input", (e) => updateValue(e.target.value))

      /**
       * The "Hit" animation logic.
       * Resets the cue and eases it back to the target position.
       */
      function handleHit() {
        if (animId) return // Prevent multiple concurrent animations

        btn.disabled = true
        const target = parseFloat(slider.value)
        const duration = 1200 // ms
        let start = null

        updateValue(0) // Start the visual stroke from 0

        function animate(now) {
          if (!start) start = now
          const progress = Math.min((now - start) / duration, 1)

          // OutQuart Easing: fast start, slow finish
          const ease = 1 - Math.pow(1 - progress, 4)
          updateValue(ease * target)

          if (progress < 1) {
            animId = requestAnimationFrame(animate)
          } else {
            animId = null
            btn.disabled = false
          }
        }

        // Short delay ensures the initial '0' value renders before animation starts
        setTimeout(() => {
          animId = requestAnimationFrame(animate)
        }, 50)
      }

      btn.addEventListener("click", handleHit)

      // Run initial sync on load
      updateValue(slider.value)
    </script>
  </body>
</html>
