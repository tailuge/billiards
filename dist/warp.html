<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Warp Clearance Analysis</title>
    <style>
      body {
        font-family: monospace;
        background: #111;
        color: #eee;
        padding: 10px;
        max-width: 900px;
        margin: 0 auto;
      }
      canvas {
        background: #000;
        border: 1px solid #444;
        display: block;
        margin-bottom: 10px;
        width: 100%;
      }
      #log {
        font-size: 10px;
        height: 100px;
        overflow-y: auto;
        background: #222;
        padding: 5px;
        margin-bottom: 20px;
      }
      .controls {
        margin-bottom: 20px;
        display: flex;
        gap: 20px;
        align-items: center;
      }
      button {
        padding: 10px 20px;
        cursor: pointer;
        background: #444;
        color: #fff;
        border: 1px solid #666;
      }
      button:hover {
        background: #555;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      input {
        background: #222;
        color: #eee;
        border: 1px solid #444;
        padding: 5px;
        width: 60px;
      }
    </style>
  </head>
  <body>
    <h1>Warp Clearance Analysis</h1>

    <div class="controls">
      <label
        >Step Size (X-axis):
        <input
          type="number"
          id="stepInput"
          value="0.2"
          min="0.01"
          max="0.5"
          step="0.01"
        />
      </label>
      <button id="runBtn">Run Analysis</button>
    </div>

    <canvas id="plotCanvas" width="800" height="400"></canvas>
    <div id="log"></div>

    <script type="module">
      import { runBatch } from "./ww.js"

      const canvas = document.getElementById("plotCanvas")
      const ctx = canvas.getContext("2d")
      const logEl = document.getElementById("log")
      const runBtn = document.getElementById("runBtn")
      const stepInput = document.getElementById("stepInput")

      const minX = 1.5
      const maxX = 10.0
      const rangeX = maxX - minX

      const defaultConfig = {
        ruleType: "threecushion",
        balls: [
          { id: 0, pos: { x: -0.5, y: 0, z: 0 } },
          { id: 1, pos: { x: 0.5, y: 0.05, z: 0 } },
          { id: 2, pos: { x: 0, y: 0.5, z: 0 } },
        ],
        cushionModel: "mathavan",
        shot: {
          cueBallId: 0,
          angle: 0,
          power: 2.5,
          offset: { x: 0.5, y: -0.35 },
          elevation: 0,
        },
        stepSize: 0.001953125,
        maxIterations: 20000,
        params: {
          mu: 0.007,
          muS: 0.136,
          rho: 0.035,
          m: 0.23,
          R: 0.03275,
          e: 0.86,
          ee: 0.84,
          μs: 0.2,
          μw: 0.2,
        },
      }

      let dataPoints = []

      function log(msg) {
        const div = document.createElement("div")
        div.textContent = msg
        logEl.appendChild(div)
        logEl.scrollTop = logEl.scrollHeight
      }

      function plot() {
        const w = canvas.width
        const h = canvas.height
        const pad = 50
        ctx.clearRect(0, 0, w, h)

        ctx.fillStyle = "#eee"
        ctx.strokeStyle = "#888"
        ctx.textAlign = "center"

        // Axes
        ctx.beginPath()
        ctx.moveTo(pad, pad)
        ctx.lineTo(pad, h - pad)
        ctx.lineTo(w - pad, h - pad)
        ctx.stroke()

        // X-axis labels
        for (let x = minX; x <= maxX; x += 0.5) {
          const px = pad + ((x - minX) / rangeX) * (w - 2 * pad)
          ctx.fillText(x.toFixed(2), px, h - pad + 15)
        }
        ctx.fillText("warpClearanceR (Units of R)", w / 2, h - 10)

        // Y-axis labels (Speedup 1 to 5)
        ctx.textAlign = "right"
        for (let y = 1; y <= 5; y++) {
          const py = h - pad - ((y - 1) / 4) * (h - 2 * pad)
          ctx.fillText(y + "x", pad - 5, py + 5)
        }
        ctx.save()
        ctx.translate(15, h / 2)
        ctx.rotate(-Math.PI / 2)
        ctx.textAlign = "center"
        ctx.fillText("Speedup Factor", 0, 0)
        ctx.restore()

        if (dataPoints.length === 0) return

        const colors = ["#ff79c6", "#50fa7b", "#8be9fd"]
        for (let shotIdx = 0; shotIdx < 3; shotIdx++) {
          ctx.strokeStyle = colors[shotIdx]
          ctx.lineWidth = 2
          ctx.beginPath()
          dataPoints.forEach((pt, i) => {
            const px = pad + ((pt.clearance - minX) / rangeX) * (w - 2 * pad)
            const py =
              h - pad - ((pt.speedups[shotIdx] - 1) / 4) * (h - 2 * pad)
            if (i === 0) ctx.moveTo(px, py)
            else ctx.lineTo(px, py)
          })
          ctx.stroke()
        }
      }

      runBtn.onclick = async () => {
        const step = parseFloat(stepInput.value) || 0.2
        runBtn.disabled = true
        dataPoints = []
        log("Starting analysis...")

        for (let r = minX; r <= maxX + 0.001; r += step) {
          const config = JSON.parse(JSON.stringify(defaultConfig))
          config.warpClearanceR = r
          log(`Testing warpClearanceR = ${r.toFixed(2)}...`)

          try {
            const results = await runBatch(config, 3, 0.001745)
            const speedups = results.map((res) => parseFloat(res.speedupFactor))
            dataPoints.push({ clearance: r, speedups })
            plot()
          } catch (e) {
            log("Error: " + e.message)
          }
        }
        log("Analysis complete.")
        runBtn.disabled = false
      }

      plot()
    </script>
  </body>
</html>
