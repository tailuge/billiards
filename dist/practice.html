<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9-Ball Layout Visualizer</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100dvh;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 16px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #eee;
        touch-action: none;
        overflow: hidden;
      }

      #table-wrap {
        position: relative;
        width: 100%;
        max-width: 820px;
        border-radius: 10px;
        box-shadow:
          0 0 0 14px #5c3a1e,
          0 0 0 18px #3b2210,
          0 0 60px 10px rgba(0,0,0,0.9);
      }

      #table-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url("images/practiceback.png") center / contain no-repeat;
        border-radius: inherit;
        z-index: 0;
        pointer-events: none;
      }

      @media (orientation: portrait) {
        #table-wrap::before {
          transform: rotate(90deg);
        }
      }

      /* portrait: constrain height so it fits viewport minus controls */
      @media (orientation: portrait) {
        #table-wrap {
          max-width: 100%;
          max-height: calc(100dvh - 100px);
          width: auto;
          /* height drives layout; width is derived from aspect-ratio */
          height: calc(100dvh - 100px);
        }
      }

      #table-surface {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 6px;
        background: radial-gradient(ellipse at 30% 30%, rgba(45,138,85,0.75) 0%, rgba(26,107,60,0.75) 55%, rgba(15,74,40,0.75) 100%);
        /* overflow visible so balls at edges aren't clipped */
        overflow: visible;
        z-index: 1;
      }

      #table-surface::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background-image:
          repeating-linear-gradient(0deg,   transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px),
          repeating-linear-gradient(90deg,  transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px);
        pointer-events: none;
      }

      .ball {
        position: absolute;
        border-radius: 50%;
        cursor: grab;
        transform: translate(-50%, -50%);
        filter: drop-shadow(2px 3px 5px rgba(0,0,0,0.75));
        user-select: none;
        touch-action: none;
        z-index: 10;
      }
      .ball.dragging {
        cursor: grabbing;
        filter: drop-shadow(4px 6px 12px rgba(0,0,0,0.95));
        z-index: 100;
      }

      .ball-label {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 100;
        pointer-events: none;
        border-radius: 50%;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        width: 100%;
        max-width: 820px;
        flex-shrink: 0;
        justify-content: center;
      }

      button {
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: transform 0.15s, box-shadow 0.15s;
        flex-shrink: 0;
      }
      button:hover  { transform: translateY(-2px); }
      button:active { transform: translateY(0); }

      .btn-preset {
        background: #1e1e1e;
        color: #aaa;
        border: 1px solid #333;
        padding: 7px 13px;
        font-size: 11px;
        letter-spacing: 0.03em;
        box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      }
      .btn-preset:hover { background: #2a2a2a; color: #eee; border-color: #555; }

      .btn-play {
        background: linear-gradient(135deg, #10b981, #059669);
        color: #fff;
        padding: 8px 22px;
        font-size: 14px;
        box-shadow: 0 4px 12px rgba(16,185,129,0.35);
        margin-left: auto;
      }
      .btn-play:hover { box-shadow: 0 6px 18px rgba(16,185,129,0.5); }
    </style>
  </head>
  <body>
    <div id="table-wrap">
      <div id="table-surface"></div>
    </div>
    <div class="controls">
      <button class="btn-preset" data-preset="scattered">scattered</button>
      <button class="btn-preset" data-preset="rack">rack up</button>
      <button class="btn-preset" data-preset="line">line up</button>
      <button class="btn-preset" data-preset="corners">corners</button>
      <button class="btn-preset" data-preset="cluster">cluster</button>
      <button class="btn-play" id="playBtn">Play</button>
    </div>

    <script>
      // ── Physics constants ──────────────────────────────────────
      const R  = 0.03275
      const HW = R * 43 + R   // half-width  (X)
      const HH = R * 21 + R   // half-height (Y)

      const BALL_COLORS = [
        "#ffffff","#ffd700","#2563eb","#ef4444",
        "#9333ea","#f97316","#16a34a","#991b1b","#111111","#fbbf24",
      ]

      // ── State ──────────────────────────────────────────────────
      let balls = []
      let dragging = null   // { ball, startTableX, startTableY }

      const wrap    = document.getElementById("table-wrap")
      const surface = document.getElementById("table-surface")

      // ── Orientation ────────────────────────────────────────────
      function portrait() { return window.innerHeight > window.innerWidth }

      function setAspectRatio() {
        if (portrait()) {
          // height is constrained by CSS; width derives from aspect-ratio
          wrap.style.aspectRatio = `${HH * 2} / ${HW * 2}`
        } else {
          wrap.style.aspectRatio = `${HW * 2} / ${HH * 2}`
        }
      }

      // ── Coordinate mapping ─────────────────────────────────────
      // table (tx,ty) → CSS % on surface element
      function tableToCSS(tx, ty) {
        if (portrait()) {
          // rotate 90°: table-x → screen-down, table-y → screen-left
          return {
            left: ((HH - ty) / (HH * 2)) * 100,
            top:  ((tx + HW) / (HW * 2)) * 100,
          }
        }
        return {
          left: ((tx + HW) / (HW * 2)) * 100,
          top:  ((ty + HH) / (HH * 2)) * 100,
        }
      }

      // client pixel → table units
      function clientToTable(clientX, clientY) {
        const r = surface.getBoundingClientRect()
        const px = clientX - r.left
        const py = clientY - r.top
        if (portrait()) {
          const tx =  (py / r.height) * (HW * 2) - HW
          const ty = -(px / r.width)  * (HH * 2) + HH
          return { x: tx, y: ty }
        }
        return {
          x: (px / r.width)  * (HW * 2) - HW,
          y: (py / r.height) * (HH * 2) - HH,
        }
      }

      // ── Ball size ──────────────────────────────────────────────
      function ballPx() {
        const r = surface.getBoundingClientRect()
        const dim = portrait() ? r.height : r.width
        return (R / (HW * 2)) * dim * 2
      }

      // ── Collision ──────────────────────────────────────────────
      function collides(ball, nx, ny) {
        for (const o of balls) {
          if (o === ball) continue
          const dx = nx - o.x, dy = ny - o.y
          if (dx*dx + dy*dy < (2*R)**2) return true
        }
        return false
      }

      // ── DOM ────────────────────────────────────────────────────
      function positionBall(ball) {
        const sz = ballPx()
        const { left, top } = tableToCSS(ball.x, ball.y)
        ball.el.style.width    = sz + "px"
        ball.el.style.height   = sz + "px"
        ball.el.style.fontSize = (sz * 0.78) + "px"
        ball.el.style.left     = left + "%"
        ball.el.style.top      = top  + "%"
      }

      function buildBall(ball) {
        const el = document.createElement("div")
        el.className = "ball"
        const c = ball.color
        el.style.background = [
          `radial-gradient(circle at 62% 65%, rgba(52,211,153,0.22) 0%, transparent 55%)`,
          `radial-gradient(circle at 35% 30%, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0) 38%)`,
          `radial-gradient(circle at 38% 35%, ${c} 0%, #000 100%)`,
        ].join(", ")

        if (ball.id !== 0) {
          const lbl = document.createElement("span")
          lbl.className = "ball-label"
          lbl.textContent = ball.id
          lbl.style.color = ball.id === 8 ? "#fff" : "#000"
          el.appendChild(lbl)
        }

        surface.appendChild(el)
        ball.el = el
        positionBall(ball)
      }

      // ── Drag (single global handler) ───────────────────────────
      function pointerDown(e) {
        const touch = e.touches ? e.touches[0] : e
        const pos = clientToTable(touch.clientX, touch.clientY)
        // find closest ball within 2R
        for (let i = balls.length - 1; i >= 0; i--) {
          const b = balls[i]
          const dx = pos.x - b.x, dy = pos.y - b.y
          if (dx*dx + dy*dy < (2*R)**2) {
            dragging = b
            b.el.classList.add("dragging")
            e.preventDefault()
            break
          }
        }
      }

      function pointerMove(e) {
        if (!dragging) return
        e.preventDefault()
        const touch = e.touches ? e.touches[0] : e
        const pos = clientToTable(touch.clientX, touch.clientY)
        const nx = Math.max(-(HW-R), Math.min(HW-R, pos.x))
        const ny = Math.max(-(HH-R), Math.min(HH-R, pos.y))

        if (!collides(dragging, nx, ny)) {
          dragging.x = nx; dragging.y = ny
        } else {
          if (!collides(dragging, nx, dragging.y)) dragging.x = nx
          if (!collides(dragging, dragging.x, ny)) dragging.y = ny
        }
        positionBall(dragging)
        logCoords()
      }

      function pointerUp() {
        if (dragging) { dragging.el.classList.remove("dragging"); dragging = null }
      }

      // ── Presets ────────────────────────────────────────────────
      const PRESETS = {
        scattered: () => [
          [ 0,     0   ], // cue
          [-1.0,  -0.3 ], [-0.5,   0.4 ], [ 0.2,  -0.5 ], [ 0.7,   0.2 ],
          [-0.8,   0.5 ], [ 0.4,  -0.2 ], [-0.3,   0.0 ], [ 1.0,   0.4 ],
          [-0.6,  -0.5 ],
        ],
        rack: () => {
          // standard 9-ball diamond rack centred at (0.3, 0)
          const cx = 0.3, d = R * 2.05
          return [
            [-1.0,  0   ],                          // cue
            [ cx,   0   ],                          // 1 (apex)
            [ cx+d,-d/2 ], [ cx+d, d/2 ],          // 2nd row
            [ cx+2*d,-d ], [ cx+2*d, 0 ], [ cx+2*d, d ], // 3rd row
            [ cx+3*d,-d/2 ], [ cx+3*d, d/2 ],      // 4th row
            [ cx+4*d, 0 ],                          // 9 (back)
          ]
        },
        line: () => Array.from({length: 10}, (_, i) => [-0.9 + i * (R*2.2), 0]),
        corners: () => [
          [ 0,    0   ],
          [-1.0, -0.5 ], [ 1.0, -0.5 ], [-1.0,  0.5 ], [ 1.0,  0.5 ],
          [-0.5, -0.5 ], [ 0.5, -0.5 ], [-0.5,  0.5 ], [ 0.5,  0.5 ],
          [ 0,   0.3  ],
        ],
        cluster: () => {
          const pts = [[ 0, 0 ]]
          const angles = Array.from({length: 9}, (_, i) => (i / 9) * Math.PI * 2)
          angles.forEach((a, i) => pts.push([ Math.cos(a)*R*2.2, Math.sin(a)*R*2.2 ]))
          return pts
        },
      }

      function applyPreset(name) {
        const positions = PRESETS[name]()
        balls.forEach((b, i) => {
          const [x, y] = positions[i] ?? [0, 0]
          b.x = Math.max(-(HW-R), Math.min(HW-R, x))
          b.y = Math.max(-(HH-R), Math.min(HH-R, y))
        })
        balls.forEach(positionBall)
        logCoords()
      }

      // ── Coords ─────────────────────────────────────────────────
      function logCoords() {
        console.log(`[${balls.flatMap(b => [+b.x.toFixed(4), +b.y.toFixed(4)]).join(", ")}]`)
      }

      // ── Init ───────────────────────────────────────────────────
      function init() {
        setAspectRatio()
        for (let i = 0; i <= 9; i++) {
          balls.push({ id: i, x: -0.8 + i*(R*2.25), y: i%2===0 ? 0.1 : -0.1, color: BALL_COLORS[i], el: null })
        }
        balls.forEach(buildBall)
        logCoords()
      }

      // ── Events ─────────────────────────────────────────────────
      surface.addEventListener("mousedown",  pointerDown)
      surface.addEventListener("touchstart", pointerDown, { passive: false })
      window.addEventListener("mousemove",   pointerMove)
      window.addEventListener("touchmove",   pointerMove, { passive: false })
      window.addEventListener("mouseup",     pointerUp)
      window.addEventListener("touchend",    pointerUp)

      window.addEventListener("resize", () => {
        setAspectRatio()
        balls.forEach(positionBall)
      })

      document.getElementById("playBtn").addEventListener("click", () => {
        const coords = balls.flatMap(b => [+b.x.toFixed(4), +b.y.toFixed(4)])
        window.location.href = `./index.html?practice=true&init=${encodeURIComponent(JSON.stringify(coords))}`
      })

      document.querySelectorAll(".btn-preset").forEach(btn => {
        btn.addEventListener("click", () => applyPreset(btn.dataset.preset))
      })

      window.addEventListener("load", init)
    </script>
  </body>
</html>
