    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "9-Ball Practice - Break Builder",
        "description": "Browser-based 9-ball practice tool with realistic physics simulation",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100dvh;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 16px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #eee;
        touch-action: none;
        overflow: hidden;
      }

      #table-wrap {
        position: relative;
        width: var(--table-width-landscape);
        max-width: 920px;
        container-type: size;
        margin: auto;
      }

      /* portrait: constrain height so it fits viewport minus controls */
      @media (orientation: portrait) {
        #table-wrap {
          max-width: 90%;
          height: var(--table-height-portrait);
          width: auto;
          /* height drives layout; width is derived from aspect-ratio */
          flex-shrink: 1;
          min-height: 0;
        }
      }

      :root {
        --bg-scale-x-landscape: 1.16;
        --bg-scale-y-landscape: 1.3;
        --bg-scale-x-portrait: 1.16;
        --bg-scale-y-portrait: 1.3;
        --table-height-portrait: 80vh;
        --table-width-landscape: 85%;
        --controls-gap: 30px;
        --p: 2px;
      }

      #table-bg {
        position: absolute;
        inset: 0;
        background: url("images/practiceback.png") center / 100% 100% no-repeat;
        opacity: 0.75;
        z-index: 0;
        pointer-events: none;
        transform: scale(
          var(--bg-scale-x-landscape),
          var(--bg-scale-y-landscape)
        );
      }

      @media (orientation: portrait) {
        #table-bg {
          width: 100cqh;
          height: 100cqw;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%) rotate(-90deg)
            scale(var(--bg-scale-x-portrait), var(--bg-scale-y-portrait));
        }
      }

      #table-surface {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 6px;
        overflow: visible;
        z-index: 1;
      }

      .ball {
        position: absolute;
        transform: translate(-50%, -50%);
        cursor: grab;
        user-select: none;
        touch-action: none;
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: center;
        filter: drop-shadow(
          calc(var(--p) * 1) calc(var(--p) * 1) 0 rgba(0, 0, 0, 0.5)
        );
        will-change: left, top;
        border-radius: 50%;
        overflow: hidden;
        box-shadow: inset calc(var(--p) * -1) calc(var(--p) * -1) 0
          rgba(0, 0, 0, 0.3);
        border: var(--p) solid #000;
        box-sizing: content-box; /* accurate to radius content */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        -webkit-font-smoothing: none;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeSpeed;
      }
      .ball.dragging,
      .ball:active {
        cursor: grabbing;
        z-index: 100;
        filter: drop-shadow(
          calc(var(--p) * 3) calc(var(--p) * 3) 0 rgba(0, 0, 0, 0.6)
        );
      }

      /* Shine effect */
      .ball::after {
        content: "";
        position: absolute;
        top: 15%;
        left: 15%;
        width: 25%;
        height: 25%;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 50%;
        pointer-events: none;
      }

      .ball-label {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 200;
        pointer-events: none;
        z-index: 1;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        width: 100%;
        max-width: 820px;
        flex-shrink: 0;
        justify-content: center;
        margin-top: var(--controls-gap);
      }

      button {
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
        flex-shrink: 0;
      }
      button:hover {
        transform: translateY(-2px);
      }
      button:active {
        transform: translateY(0);
      }

      .btn-preset {
        background: #1e1e1e;
        color: #aaa;
        border: 1px solid #333;
        padding: 7px 13px;
        font-size: 11px;
        letter-spacing: 0.03em;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      }
      .btn-preset:hover {
        background: #2a2a2a;
        color: #eee;
        border-color: #555;
      }

      .btn-play {
        background: linear-gradient(135deg, #10b981, #059669);
        color: #fff;
        padding: 8px 22px;
        font-size: 14px;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
      }
      .btn-play:hover {
        box-shadow: 0 6px 18px rgba(16, 185, 129, 0.5);
      }

      .btn-share {
        background: #1e1e1e;
        color: #aaa;
        border: 1px solid #333;
        padding: 7px 13px;
        font-size: 11px;
        letter-spacing: 0.03em;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: auto;
      }
      .btn-share:hover {
        background: #2a2a2a;
        color: #eee;
        border-color: #555;
      }
      .btn-share svg {
        width: 14px;
        height: 14px;
        stroke-width: 2.5;
      }
    </style>

  <body>
  <h1 hidden>Free Pool, Billiards and Snooker</h1>
    <div id="table-wrap">
      <div id="table-bg"></div>
      <div id="table-surface"></div>
    </div>
    <div class="controls">
      <button class="btn-preset" data-preset="scattered">scattered</button>
      <button class="btn-preset" data-preset="grid">grid</button>
      <button class="btn-preset" data-preset="line">line up</button>
      <button class="btn-preset" data-preset="corners">corners</button>
      <button class="btn-preset" data-preset="cluster">cluster</button>
      <button class="btn-share" id="shareBtn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
        Share
      </button>
      <button class="btn-play" id="playBtn">Play</button>
    </div>

    <script>
      // ── Physics constants ──────────────────────────────────────
      const R = 0.03275
      const HW = R * 43 + R // half-width  (X)
      const HH = R * 21 + R // half-height (Y)

      const BALL_COLORS = [
        "#ffffff",
        "#ffd700",
        "#2563eb",
        "#ef4444",
        "#9333ea",
        "#f97316",
        "#16a34a",
        "#991b1b",
        "#111111",
        "#fbbf24",
      ]

      // ── State ──────────────────────────────────────────────────
      let balls = []
      let dragging = null // { ball, startTableX, startTableY }

      const wrap = document.getElementById("table-wrap")
      const surface = document.getElementById("table-surface")

      // ── Orientation ────────────────────────────────────────────
      function portrait() {
        return window.innerHeight > window.innerWidth
      }

      function setAspectRatio() {
        if (portrait()) {
          // height is constrained by CSS; width derives from aspect-ratio
          wrap.style.aspectRatio = `${HH * 2} / ${HW * 2}`
        } else {
          wrap.style.aspectRatio = `${HW * 2} / ${HH * 2}`
        }
      }

      // ── Coordinate mapping ─────────────────────────────────────
      // table (tx,ty) → CSS % on surface element
      function tableToCSS(tx, ty) {
        if (portrait()) {
          // rotate 90°: table-x → screen-down, table-y → screen-left
          return {
            left: ((HH - ty) / (HH * 2)) * 100,
            top: ((tx + HW) / (HW * 2)) * 100,
          }
        }
        return {
          left: ((tx + HW) / (HW * 2)) * 100,
          top: ((ty + HH) / (HH * 2)) * 100,
        }
      }

      // client pixel → table units
      function clientToTable(clientX, clientY) {
        const r = surface.getBoundingClientRect()
        const px = clientX - r.left
        const py = clientY - r.top
        if (portrait()) {
          const tx = (py / r.height) * (HW * 2) - HW
          const ty = -(px / r.width) * (HH * 2) + HH
          return { x: tx, y: ty }
        }
        return {
          x: (px / r.width) * (HW * 2) - HW,
          y: (py / r.height) * (HH * 2) - HH,
        }
      }

      // ── Ball size ──────────────────────────────────────────────
      function ballPx() {
        const r = surface.getBoundingClientRect()
        const dim = portrait() ? r.height : r.width
        return (R / (HW * 2)) * dim * 2
      }

      // ── Collision ──────────────────────────────────────────────
      function collides(ball, nx, ny) {
        for (const o of balls) {
          if (o === ball) continue
          const dx = nx - o.x,
            dy = ny - o.y
          if (dx * dx + dy * dy < (2 * R) ** 2) return true
        }
        return false
      }

      // ── DOM ────────────────────────────────────────────────────
      function positionBall(ball) {
        const sz = ballPx()
        const { left, top } = tableToCSS(ball.x, ball.y)
        ball.el.style.width = sz + "px"
        ball.el.style.height = sz + "px"
        ball.el.style.fontSize = sz * 0.78 + "px"
        ball.el.style.left = left + "%"
        ball.el.style.top = top + "%"
      }

      function buildBall(ball) {
        const el = document.createElement("div")
        el.className = "ball"
        el.style.backgroundColor = ball.color

        if (ball.id !== 0) {
          const lbl = document.createElement("span")
          lbl.className = "ball-label"
          lbl.textContent = ball.id
          lbl.style.color = ball.id === 8 ? "#fff" : "#000"
          el.appendChild(lbl)
        }

        surface.appendChild(el)
        ball.el = el
        positionBall(ball)
      }

      // ── Drag (single global handler) ───────────────────────────
      function pointerDown(e) {
        const touch = e.touches ? e.touches[0] : e
        const pos = clientToTable(touch.clientX, touch.clientY)
        // find closest ball within 2R
        for (let i = balls.length - 1; i >= 0; i--) {
          const b = balls[i]
          const dx = pos.x - b.x,
            dy = pos.y - b.y
          if (dx * dx + dy * dy < (2 * R) ** 2) {
            dragging = b
            b.el.classList.add("dragging")
            e.preventDefault()
            break
          }
        }
      }

      function pointerMove(e) {
        if (!dragging) return
        e.preventDefault()
        const touch = e.touches ? e.touches[0] : e
        const pos = clientToTable(touch.clientX, touch.clientY)
        const nx = Math.max(-(HW - R), Math.min(HW - R, pos.x))
        const ny = Math.max(-(HH - R), Math.min(HH - R, pos.y))

        if (!collides(dragging, nx, ny)) {
          dragging.x = nx
          dragging.y = ny
        } else {
          if (!collides(dragging, nx, dragging.y)) dragging.x = nx
          if (!collides(dragging, dragging.x, ny)) dragging.y = ny
        }
        positionBall(dragging)
        logCoords()
      }

      function pointerUp() {
        if (dragging) {
          dragging.el.classList.remove("dragging")
          dragging = null
        }
      }

      // ── Presets ────────────────────────────────────────────────
      const PRESETS = {
        scattered: () => [
          -0.6004, -0.1078, -1, -0.3, -0.5, 0.4, 0.2, -0.5, 0.7, 0.2, -0.8, 0.5,
          0.4, -0.2, -0.3, 0, 1, 0.4, -0.6, -0.5,
        ],
        grid: () => [
          0.0056, -0.0037, 1.0837, 0.3792, 1.0726, -0.3829, 0.7231, -0.3829,
          0.7268, 0.3755, 0.3699, 0.3755, 1.08, -0.0037, 0.3699, -0.3829,
          0.7231, -0.0037, 0.3551, -0.0037,
        ],
        line: () => [
          -0.7175, 0, -0.3297, 0, -0.1594, 0, 0.0109, 0, 0.1812, 0, 0.3515, 0,
          0.5218, 0, 0.6921, 0, 0.8624, 0, 1.0327, 0,
        ],
        corners: () => [
          -0.725, 0, -0.0056, -0.6764, 1.3661, -0.6615, 1.2841, 0.5718, 0.0019,
          0.6652, -1.3549, 0.6503, -1.2804, -0.5792, -1.34, -0.6316, 1.3437,
          0.6278, 0.0019, 0,
        ],
        cluster: () => [
          -0.1617, 0.171, 0.3922, 0.2417, 0.4815, 0.0632, 0.6227, 0.0558,
          0.6488, -0.0112, 0.619, -0.0855, 0.5521, 0.0892, 0.5447, -0.1041,
          0.4629, -0.0706, 0.4406, 0,
        ],
      }

      function applyPreset(name) {
        const positions = PRESETS[name]()
        balls.forEach((b, i) => {
          const x = positions[i * 2] ?? 0
          const y = positions[i * 2 + 1] ?? 0
          b.x = Math.max(-(HW - R), Math.min(HW - R, x))
          b.y = Math.max(-(HH - R), Math.min(HH - R, y))
        })
        balls.forEach(positionBall)
        logCoords()
      }

      // ── Coords ─────────────────────────────────────────────────
      function logCoords() {
        console.log(
          `[${balls.flatMap((b) => [+b.x.toFixed(4), +b.y.toFixed(4)]).join(", ")}]`
        )
      }

      // ── Init ───────────────────────────────────────────────────
      function init() {
        setAspectRatio()
        for (let i = 0; i <= 9; i++) {
          balls.push({ id: i, x: 0, y: 0, color: BALL_COLORS[i], el: null })
        }
        balls.forEach(buildBall)

        const params = new URLSearchParams(window.location.search)
        if (params.has("init")) {
          try {
            const data = JSON.parse(params.get("init"))
            balls.forEach((b, i) => {
              b.x = -data[i * 2]
              b.y = data[i * 2 + 1]
            })
            balls.forEach(positionBall)
          } catch (e) {
            applyPreset("corners")
          }
        } else {
          applyPreset("corners")
        }
      }

      // ── Events ─────────────────────────────────────────────────
      surface.addEventListener("mousedown", pointerDown)
      surface.addEventListener("touchstart", pointerDown, { passive: false })
      window.addEventListener("mousemove", pointerMove)
      window.addEventListener("touchmove", pointerMove, { passive: false })
      window.addEventListener("mouseup", pointerUp)
      window.addEventListener("touchend", pointerUp)

      window.addEventListener("resize", () => {
        setAspectRatio()
        balls.forEach(positionBall)
      })

      document.getElementById("playBtn").addEventListener("click", () => {
        const coords = balls.flatMap((b) => [
          +(-b.x).toFixed(4),
          +b.y.toFixed(4),
        ])
        const params = new URLSearchParams(window.location.search)
        params.set("practice", "true")
        params.set("init", JSON.stringify(coords))
        window.location.href = `./index.html?${params.toString()}`
      })

      document.querySelectorAll(".btn-preset").forEach((btn) => {
        btn.addEventListener("click", () => applyPreset(btn.dataset.preset))
      })

      document.getElementById("shareBtn").addEventListener("click", () => {
        const coords = balls.flatMap((b) => [
          +(-b.x).toFixed(4),
          +b.y.toFixed(4),
        ])
        const url = new URL(window.location.origin + window.location.pathname)
        url.searchParams.set("init", JSON.stringify(coords))

        const shareData = {
          title: "9-Ball Practice Layout",
          text: "Check out this 9-ball layout!",
          url: url.toString(),
        }

        if (navigator.share && navigator.canShare(shareData)) {
          navigator
            .share(shareData)
            .catch((err) => console.log("Share failed", err))
        } else {
          navigator.clipboard.writeText(url.toString()).then(() => {
            const btn = document.getElementById("shareBtn")
            const originalContent = btn.innerHTML
            btn.innerHTML = "Copied!"
            setTimeout(() => {
              btn.innerHTML = originalContent
            }, 2000)
          })
        }
      })

      window.addEventListener("load", init)
    </script>
  </body>
</html>
