<!doctype html>
<html lang="en">
  <head>
    <title>
      2 Player Billiards - Free Local Multiplayer Pool | Break Builder
    </title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta
      name="description"
      content="Play local 2 player billiards on one screen. Side-by-side pool game with realistic physics simulation. Free and open source."
    />
    <meta name="robots" content="index,follow" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width" />
    <link
      rel="canonical"
      href="https://tailuge.github.io/billiards/dist/2p.html"
    />
    <meta
      property="og:title"
      content="2 Player Billiards - Free Local Multiplayer Pool"
    />
    <meta
      property="og:description"
      content="Play free local 2 player billiards on one screen. Side-by-side open source pool game with realistic physics."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tailuge.github.io/billiards/dist/2p.html"
    />
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="2 Player Billiards - Free Local Multiplayer Pool"
    />
    <meta
      name="twitter:description"
      content="Play free local 2 player billiards on one screen. Free and open source."
    />
    <link rel="stylesheet" type="text/css" href="css/index.css" />
  </head>

  <body>
    <div class="box">
      <iframe
        src="index.html"
        title="Player 1 Table View"
        id="P1"
        width="620"
        height="450"
        style="float: left"
      ></iframe>
    </div>
    <div class="box">
      <iframe
        src="index.html"
        title="Player 2 Table View"
        id="P2"
        width="620"
        height="450"
        style="float: right"
      ></iframe>
    </div>
  </body>

  <script>
    const urlParams = new URLSearchParams(window.location.search)
    const websocketserver =
      urlParams.get("websocketserver") ?? "ws://localhost:8080"
    const ruletype = urlParams.get("ruletype") ?? "nineball"
    const shotClock = urlParams.get("shotClock")
    const practice = urlParams.get("practice")
    const unique = Math.floor(Math.random() * 0xffff).toString(16)
    let url = `index.html?ruletype=${ruletype}&websocketserver=${websocketserver}&tableId=${unique}`
    if (shotClock) {
      url += `&shotClock=${shotClock}`
    }
    if (practice) {
      url += `&practice=${practice}`
    }
    document.getElementById("P1").src =
      `${url}&userId=p1id&userName=P1&first=true`
    document.getElementById("P2").src = `${url}&userId=p2id&userName=P2`
  </script>
</html>
