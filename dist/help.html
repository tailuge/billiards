<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fine vs Coarse Aim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo:wght@200;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Exo:wght@200;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Exo, sans-serif;
        font-weight: 200;
        background: #111;
        color: white;
        min-height: 100vh;
        overflow: hidden auto;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 16px 12px 16px;
      }

      /* Hide scrollbar for Chrome, Safari, Opera */
      ::-webkit-scrollbar {
        display: none;
      }

      /* Hide scrollbar for Firefox */
      html {
        scrollbar-width: none;
      }

      .phone {
        width: 100%;
        max-width: 360px;
        aspect-ratio: 16 / 9;
        border: 2px solid #666;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        background: linear-gradient(
          to bottom,
          #1b2d44 0%,
          #13212f 50%,
          #1a1611 100%
        );
      }

      .top,
      .bottom {
        position: absolute;
        left: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .top {
        top: 0;
        height: 42%;
      }

      .bottom {
        bottom: 0;
        height: 42%;
      }

      .divider {
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        border-top: 2px dashed rgb(255 255 255 / 25%);
        transform: translateY(-50%);
      }

      .zoom {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        opacity: 0.9;
      }

      .zoom-arrow {
        width: 2px;
        height: 90px;
        background: white;
        border-radius: 999px;
        position: relative;
      }

      .zoom-arrow::before,
      .zoom-arrow::after {
        content: "";
        position: absolute;
        left: 50%;
        width: 10px;
        height: 10px;
        border-top: 3px solid white;
        border-right: 3px solid white;
      }

      .zoom-arrow::before {
        top: -2px;
        transform: translateX(-50%) rotate(-45deg);
      }

      .zoom-arrow::after {
        bottom: -2px;
        transform: translateX(-50%) rotate(135deg);
      }

      .zoom-label {
        font-size: 0.72rem;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        letter-spacing: 0.08em;
        opacity: 0.7;
      }

      .balls {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      .ball {
        width: 1px;
        height: 1px;
        border-radius: 50%;
        background: white;
        opacity: 0.9;
      }

      .arrow {
        position: relative;
        height: 2px;
        background: white;
        border-radius: 999px;
      }

      .arrow::before,
      .arrow::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 10px;
        height: 10px;
        border-top: 3px solid white;
        border-right: 3px solid white;
      }

      .arrow::before {
        left: -2px;
        transform: translateY(-50%) rotate(-135deg);
      }

      .arrow::after {
        right: -2px;
        transform: translateY(-50%) rotate(45deg);
      }

      .fine {
        width: 110px;
      }

      .coarse {
        width: 240px;
      }

      .label {
        margin-top: 8px;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

      .sub {
        margin-top: 4px;
        font-size: 0.78rem;
        opacity: 0.7;
      }

      .controls-panel {
        width: 100%;
        max-width: 360px;
        background: rgb(0 0 0 / 80%);
        border: 1px solid rgb(255 255 255 / 10%);
        border-radius: 8px;
        padding: 10px;
        box-shadow: 0 4px 16px rgb(0 0 0 / 30%);
      }

      .help-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 2px;
        font-size: 0.95rem;
        color: #eee;
      }

      .help-row:last-child {
        margin-bottom: 0;
      }

      kbd {
        background: #333;
        color: #fff;
        padding: 2px 8px;
        border-radius: 6px;
        font-family: Exo, monospace;
        border-bottom: 2px solid #555;
        font-size: 0.8rem;
        min-width: 32px;
        text-align: center;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="phone">
        <div class="top">
          <div class="balls">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
          </div>
          <div class="arrow fine"></div>
          <div class="label">Fine Aim</div>
          <div class="sub">near top = precise adjustment</div>
        </div>

        <div class="divider"></div>

        <div class="zoom">
          <div class="zoom-arrow"></div>
          <div class="zoom-label">ZOOM</div>
        </div>

        <div class="bottom">
          <div class="balls">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
          </div>
          <div class="arrow coarse"></div>
          <div class="label">Coarse Aim</div>
          <div class="sub">near bottom = faster turning</div>
        </div>
      </div>

      <div class="controls-panel">
        <div class="help-row"><kbd>⇦ ⇨</kbd><span>Aim</span></div>
        <div class="help-row"><kbd>Ctrl ⇦ ⇨</kbd><span>Fine aim</span></div>
        <div class="help-row">
          <kbd>⇧ ⇩</kbd><span>Topspin &amp; backspin</span>
        </div>
        <div class="help-row"><kbd>Shift ⇦ ⇨</kbd><span>Side spin</span></div>
        <div class="help-row">
          <kbd>Space</kbd><span>Hit — hold for more power</span>
        </div>
        <div class="help-row"><kbd>🖱️ scroll</kbd><span>Shot power</span></div>
        <div class="help-row"><kbd>🖱️ dbl click</kbd><span>Hit</span></div>
        <div class="help-row"><kbd>M</kbd><span>Masse angle</span></div>
        <div class="help-row"><kbd>O</kbd><span>Camera view</span></div>
        <div class="help-row"><kbd>F</kbd><span>Full screen</span></div>
        <div class="help-row"><kbd>C</kbd><span>Chat</span></div>
        <div class="help-row"><kbd>H</kbd><span>Help</span></div>
      </div>
    </main>
  </body>
</html>
