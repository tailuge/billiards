<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Billiards Lobby</title>
    <meta
      name="description"
      content="Join the multiplayer lobby for Billiards. Find matches, challenge players, and play realistic pool online with accurate physics."
    />
    <meta
      name="keywords"
      content="billiards lobby, multiplayer pool, online billiards, snooker, 9-ball, 8-ball, three-cushion, free game, open source"
    />
    <meta name="robots" content="index,follow" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link
      rel="canonical"
      href="https://tailuge.github.io/billiards/dist/lobby.html"
    />

    <meta
      property="og:title"
      content="Tailuge Billiards"
    />
    <meta
      property="og:description"
      content="Join the multiplayer lobby for Billiards. Find matches and play realistic pool online."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tailuge.github.io/billiards/dist/lobby.html"
    />
    <meta
      property="og:image"
      content="https://tailuge.github.io/billiards/dist/images/promo.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:video" content="https://youtu.be/bAeiRQcQuyg" />
    <meta property="og:video:type" content="text/html" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Multiplayer Billiards - Free"
    />
    <meta
      name="twitter:description"
      content="Join the multiplayer lobby for Billiards. Find matches and play realistic pool online."
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Billiards Pool Game",
        "url": "https://tailuge.github.io/billiards/dist/lobby.html",
        "image": "https://tailuge.github.io/billiards/dist/images/promo.png",
        "description": "Multiplayer lobby for the open source pool and billiards simulation game",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "creator": {
          "@type": "Person",
          "name": "tailuge"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo:wght@200;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="assets/threecushion.png" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: auto;
        scrollbar-width: none;
        background: #f5f5f5;
      }
      html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
      html[theme="dark"],
      html[theme="dark"] body {
        background: #1a1a1a;
      }
    </style>
    <script>
      const _t =
        localStorage.getItem("theme") ||
        (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
      document.documentElement.setAttribute("theme", _t)
    </script>
  </head>
  <body>
    <lobby-app></lobby-app>

    <script src="lobby.js" type="module"></script>
  </body>
</html>
