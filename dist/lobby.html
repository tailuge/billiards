<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo:wght@200&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="assets/golden-cup.png" />
    <style>
      *,
      html,
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow-y: auto;
        scrollbar-width: none;
      }
      body::-webkit-scrollbar {
        display: none;
      }
      main {
        margin: 0.3rem 0.2rem 0;
      }
      html[theme="dark"],
      html[theme="dark"] body {
        background: #1a1a1a;
      }
      html[theme="light"],
      html[theme="light"] body {
        background: #f5f5f5;
      }
    </style>
    <script>
      const _t =
        localStorage.getItem("theme") ||
        (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
      document.documentElement.setAttribute("theme", _t)
    </script>
  </head>
  <body>
    <main>
      <lobby-app></lobby-app>
    </main>

    <script src="lobby.js" type="module"></script>
  </body>
</html>
