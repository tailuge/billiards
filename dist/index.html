    />

        "applicationCategory": "GameApplication",

          "uploadDate": "2026-04-30T00:00:00+00:00"
        }
      }

    <link rel="stylesheet" type="text/css" href="css/fonts.css" />
    <link rel="stylesheet" type="text/css" href="css/index.css" />
    <link rel="stylesheet" type="text/css" href="css/aiminputs.css" />
    <link rel="stylesheet" type="text/css" href="css/powerinput.css" />
    <link rel="stylesheet" type="text/css" href="css/notification.css" />
    <link rel="stylesheet" type="text/css" href="css/tray.css" />
    <link rel="stylesheet" type="text/css" href="css/chat.css" />
    <link rel="stylesheet" type="text/css" href="css/lobby.css" />
    <link rel="stylesheet" type="text/css" href="css/menu.css" />
    <link rel="stylesheet" type="text/css" href="css/wood.css" />
  </head>

  <body>
    <h1 hidden>무료 당구, 포켓볼 및 스누커 시뮬레이터</h1>
    <div id="viewP1" class="view3d">
      <div id="snookerScoreOverlay">
        <div id="snookerScore" aria-live="polite">
          <div id="breakScore" class="breakScore"></div>
        </div>
      </div>
      <div id="notificationOverlay">
        <div id="notification" aria-live="assertive" role="alert"></div>
      </div>
      <div id="helpOverlay" hidden>
        <iframe></iframe>
        <div class="help-footer">
          <button
            class="lobby-btn"
            onclick="
              window.location.href =
                'https://billiards.tailuge.workers.dev/lobby'
            "
          >
            로비 방문
          </button>
          <span class="help-text">그래픽 모드 및 플레이어 이름 설정</span>
          <button id="helpClose">닫기</button>
        </div>
      </div>
      <div id="analysisOverlay" hidden>
        <iframe></iframe>
        <div class="help-footer">
          <button id="analysisClose">닫기</button>
        </div>
      </div>
      <div id="botDebugOverlay">
        <header>
          <span id="botDebugToggle">🦞</span>
          <div>
            <button
              id="botDebugClear"
              type="button"
              aria-label="디버그 로그 삭제"
            >
              기록 삭제
            </button>
          </div>
        </header>
        <pre id="botDebugLog" aria-live="polite">
          <img src="images/billiards.png" alt="당구 포켓볼 게임 홍보 - 현실적인 물리 시뮬레이션">
          현실적인 물리가 적용된 무료 온라인 당구 게임을 즐겨보세요. 오픈 소스 브라우저 시뮬레이션입니다.
          당구, 스누커, 9볼, 포켓볼, 캐롬, 3쿠션, 온라인 게임, 무료, 오픈 소스, billiards, snooker, pool, 3-cushion, online game, free, open source
          <a href="https://github.com/tailuge/billiards">GitHub</a>에서 소스 코드를 확인하세요.
        </pre>
      </div>
      <div class="chatarea">
        <div id="chatoutput" class="chatoutput"></div>
      </div>
      <dialog id="inputTextDiv">
        <input
          id="inputText"
          type="text"
          placeholder="메시지 입력..."
          maxlength="24"
          autofocus
          autocomplete="off"
          aria-label="채팅 메시지 입력"
        />
        <button id="inputSend">전송</button>
        <button id="inputClose">닫기</button>
      </dialog>
    </div>
    <div id="panel" class="panel wood-texture">
      <div class="aimControlColumn">
        <div class="aimingArea">
          <button
            class="hitButton timeout-btn"
            id="cueHit"
            type="button"
            aria-label="수구 타격"
          >
            타격
          </button>
        </div>
        <div id="tiltSliderContainer" class="tiltSliderContainer" hidden>
          <angle-input id="cueTilt" aria-label="경사각"></angle-input>
        </div>
        <template id="angle-input-template">
          <div class="area" id="area">
            <div class="ball"></div>
            <div class="rotator" id="rot">
              <div class="stick">
                <div class="tip"></div>
                <div class="ferrule"></div>
                <div class="shaft"></div>
                <div class="butt"></div>
              </div>
            </div>
          </div>
        </template>
        <div id="ballContainerWrapper" class="ballContainerWrapper">
          <button id="openElevation" class="openElevation">+</button>
          <div id="ballContainer" class="ballContainer">
            <div id="objectBall" class="objectBall"></div>
            <div id="cueBall" class="cueBall">
              <div id="cueTip" class="cueTip"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="powerSliderContainer" class="powerSliderContainer">
        <div class="power-track"></div>
        <input
          class="powerSlider"
          type="range"
          min="0"
          max="1"
          step="0.01"
          value="0.65"
          id="cuePower"
          aria-label="파워 조절"
        />
      </div>
      <div class="outerMenu">
        <button
          class="menuButton half-height"
          title="댓글"
          id="comment"
          type="submit"
          aria-label="댓글"
          hidden
        >
          🗨
        </button>
        <div id="commentMenu" class="comment-menu" style="display: none">
          <button class="comment-emoji" data-angle="315"></button>
          <button class="comment-emoji" data-angle="0"></button>
          <button class="comment-emoji" data-angle="45"></button>
          <button class="comment-emoji" data-angle="270"></button>
          <button class="comment-emoji" data-angle="180"></button>
          <button class="comment-emoji" data-angle="90"></button>
          <button class="comment-emoji">🍀</button>
          <button class="comment-emoji">🍷</button>
          <button class="comment-emoji">🐑</button>
          <button class="comment-emoji">⛺</button>
          <button class="comment-emoji">👏</button>
          <button class="comment-emoji">👓</button>
          <button id="openTextInput" class="comment-emoji">✉️</button>
          <button class="comment-emoji">🎖️</button>
          <button class="comment-emoji">👀</button>
        </div>
        <button
          class="menuButton"
          title="공유"
          id="share"
          type="submit"
          aria-label="리플레이 링크 공유"
          hidden
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
        </button>
        <button
          class="menuButton half-height"
          title="기권"
          id="concede"
          type="submit"
          aria-label="기권"
          hidden
        >
          🏳️
        </button>
        <button
          class="menuButton"
          title="샷 분석"
          id="analysis"
          type="submit"
          aria-label="샷 분석"
          hidden
        >
          🔍
        </button>
        <button
          class="menuButton half-height"
          title="메뉴"
          id="menu"
          type="submit"
          aria-label="메뉴"
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <button
          class="menuButton"
          title="뷰 전환"
          id="camera"
          type="submit"
          aria-label="카메라 뷰 토글"
        >
          🎥
        </button>
      </div>
    </div>

    <div id="ballTray" class="tray-container" aria-live="polite" role="log">
      <div class="nav-btn btn-left" id="trayLeft">❮</div>
      <div class="ball-tray-list" id="ballTrayList"></div>
      <div class="nav-btn btn-right" id="trayRight">❯</div>
    </div>
    <div class="tray-score-container">
      <div id="p1Score" class="p1Score"></div>
      <div id="p2Score" class="p2Score"></div>
    </div>
    <div id="lobbyContainer">
      <div class="challenge-row">
        <span id="challengePill" class="challenge-pill" hidden>
          <button id="challengeAccept">수락</button>
          <button id="challengeDecline">거절</button>
        </span>
      </div>
      <a
        href="https://billiards.tailuge.workers.dev/lobby.html"
        class="pill"
        title="로비"
        id="lobbyOverlay"
        aria-label="멀티플레이어 로비"
        ><span class="lobby-count"></span
      ></a>
    </div>
    <section class="constants" id="constants" aria-label="물리 상수">
      <p>물리 상수</p>
      <div class="nw">
        <input id="R" type="range" /><label for="R">R</label>
      </div>
      <div class="nw">
        <input id="m" type="range" /><label for="m">m</label>
      </div>
      <div class="nw">
        <input id="e" type="range" /><label for="e">e</label>
      </div>
      <div class="nw">
        <input id="mu" type="range" /><label for="mu">mu</label>
      </div>
      <div class="nw">
        <input id="muS" type="range" /><label for="muS">muS</label>
      </div>
      <div class="nw">
        <input id="muC" type="range" /><label for="muC">muC</label>
      </div>
      <div class="nw">
        <input id="rho" type="range" /><label for="rho">rho</label>
      </div>
      <div class="nw">
        <input id="μs" type="range" /><label for="μs">μs</label>
      </div>
      <div class="nw">
        <input id="μw" type="range" /><label for="μw">μw</label>
      </div>
      <div class="nw">
        <button id="network" aria-label="네트워크 설정 토글">네트워크🗲</button>
      </div>
    </section>
    <script defer src="three_core.js"></script>
    <script defer src="three_module.js"></script>
    <script defer src="three_examples.js"></script>
    <script defer src="messaging.js"></script>
    <script defer src="index.js"></script>
  </body>
</html>
