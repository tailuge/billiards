<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snooker Exam</title>
  <link rel="stylesheet" href="exam.css" />
</head>

<body>
  <header>
    <h1>Snooker Exam</h1>
  </header>

  <section class="summary">
    <div class="assessment-line">
      <p id="assessment" class="assessment">Assessment: Unknown</p>
      <button id="resetExam" class="reset-btn">Reset Exam</button>
    </div>
    <h2>Shot List</h2>
    <ul id="shotList"></ul>
  </section>

  <h2>Basic</h2>
  <div class="question-block">
    <div class="question-text">
      <h3>Shot 1: Pot the Black</h3>
      <p>
        A simple straight shot to pot the black ball into the top corner pocket.
      </p>
      <button class="play-btn">Play Shot</button>
    </div>
    <div class="question-diagram">
      <svg class="billiards-table"
        data-json-shots='[{"balls":[{"id":0,"pos":{"x":0.5,"y":0,"z":0}},{"id":6,"pos":{"x":1.1,"y":0,"z":0}}],"ruleType":"snooker","shot":{"cueBallId":0,"angle":0,"power":2,"offset":{"x":0,"y":0},"elevation":0}}]'
        data-figure="2.00 m/s" viewBox="-1.8 -1 3.6 2" xmlns="http://www.w3.org/2000/svg">
        <rect x="-1.512" y="-0.756" width="3.024" height="1.512" fill="none" stroke="#000" stroke-width="0.01" />
        <circle cx="0.5" cy="0" r="0.03275" fill="white" stroke="black" stroke-width="0.001" />
        <circle cx="1.1" cy="0" r="0.03275" fill="black" stroke="white" stroke-width="0.001" />
      </svg>
    </div>
  </div>

  <div id="gameOverlay">
    <div class="iframe-container">
      <button class="close-btn" id="closeGame">Close</button>
      <iframe id="gameIframe" src=""></iframe>
    </div>
  </div>

  <script type="module">
    import { initExam } from "./exam.js";
    initExam();
  </script>
</body>

</html>
