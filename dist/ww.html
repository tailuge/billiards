<!DOCTYPE html>
<html>
<head>
    <title>Physics Worker Test</title>
    <style>
        body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
        #output { white-space: pre-wrap; background: #222; padding: 10px; border: 1px solid #444; margin-top: 10px; height: 400px; overflow-y: scroll; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Physics Worker Test</h1>
    <button id="runSim">Run Simulation</button>
    <div id="output">Results will appear here...</div>

    <script>
        const runBtn = document.getElementById('runSim');
        const output = document.getElementById('output');

        runBtn.onclick = () => {
            output.textContent = "Starting simulation...";
            console.log("Starting simulation...");

            const worker = new Worker('physics_worker.js');

            worker.onmessage = (e) => {
                const data = e.data;
                console.log("Received from worker:", data.type);
                if (data.type === 'SIM_COMPLETE' || data.type === 'ERROR') {
                    output.textContent = JSON.stringify(data, null, 2);
                }
            };

            worker.onerror = (e) => {
                console.error("Worker Global Error:", e);
                output.textContent = "Worker Global Error: Check console";
            };

            const config = {
                ruleType: "threecushion",
                balls: [
                    { id: 0, pos: { x: -0.5, y: 0, z: 0 } }, // White
                    { id: 1, pos: { x: 0.5, y: 0.01, z: 0 } }, // Yellow
                    { id: 2, pos: { x: 0, y: 0.5, z: 0 } }    // Red
                ],
                cushionModel: "mathavan",
                shot: {
                    cueBallId: 0,
                    angle: 0,
                    power: 0.5,
                    offset: { x: 0.05, y: 0 },
                    elevation: 0
                },
                stepSize: 0.01,
                maxIterations: 10
            };

            worker.postMessage(config);
        };
    </script>
</body>
</html>
