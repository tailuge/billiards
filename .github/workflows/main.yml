# Basic workflow

name: Build

on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: install dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 2
          retry_wait_seconds: 10
          command: yarn install --immutable

      - name: build
        run: yarn build

      - name: generate coverage
        run: |
          yarn coverage
          echo done

      - name: upload to codecov.io
        uses: codecov/codecov-action@v5
        with:
          directory: ./coverage/
          plugins: noop
          files: ./coverage/coverage-final.json

      - name: delete coverage and blend files
        run: rm -rf coverage dist/models/*.blend dist/models/d-snooker.gltf dist/models/p8.gltf dist/models/snooker.gltf dist/models/d-snooker.bin dist/models/p8.bin dist/models/snooker.bin

      - name: upload build artifact
        if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifact
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-artifact
          path: dist/

      - name: prepare deployment
        run: |
          mkdir _site
          cp -R dist _site/
          cp _site/dist/redirect.html _site/index.html
          cp _site/dist/robots.txt _site/
          cp _site/dist/sitemap.xml _site/
          cp _site/dist/google2eba932626b1b383.html _site/ || true
          cp _site/dist/naver200febfca14870e645245d6808f2a89e.html _site/ || true
          echo "Removing unnecessary files for deployment"
          rm -rf _site/dist/models/*.blend _site/dist/models/d-snooker.gltf _site/dist/models/p8.gltf _site/dist/models/snooker.gltf _site/dist/models/d-snooker.bin _site/dist/models/p8.bin _site/dist/models/snooker.bin
          ls -R _site/

      - name: Upload artifact
        if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
