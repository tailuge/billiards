# Basic workflow

name: Build

on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: install dependencies
        run: yarn install

      - name: build
        run: yarn build

      - name: generate coverage
        run: |
          yarn coverage
          echo done

      - name: upload to codecov.io
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info

      - name: delete coverage and blend files
        run: rm -rf coverage dist/models/*.blend

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifact
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4

      - name: download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-artifact
          path: dist/

      - name: cleanup for deployment
        run: |
          cp dist/redirect.html index.html
          echo "Removing unnecessary files for deployment"
          rm -rf node_modules src test .github LICENSE yarn.lock
          du -h * 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
